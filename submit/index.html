<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Dashboard | Premiere Flow</title>
    
    <style>
        :root {
            --primary-black: #000000;
            --accent-gold: #c5a059;
            --bg-dark: #000000;
            --card-bg: #0a0a0a;
            --text-white: #ffffff;
            --text-dim: #666;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid #111; display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1000;
        }

        .header-left img { height: 22px; border: none; }
        .header-right { text-align: right; }
        .user-email { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        .user-credits { font-size: 11px; color: var(--accent-gold); font-weight: 900; display: block; margin-top: 3px; letter-spacing: 0.5px; }

        #app-container { margin-top: 90px; margin-bottom: 100px; padding: 0 20px; max-width: 600px; margin-left: auto; margin-right: auto; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #050505; border-top: 1px solid #111; display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #444; text-decoration: none; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: var(--transition); font-weight: 800; }
        .nav-item.active { color: #fff; }
        .nav-icon { font-size: 22px; margin-bottom: 6px; }

        .view-section { display: none; }
        .view-section.active { display: block; }
        .card { background: var(--card-bg); border: 1px solid #111; border-radius: 16px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: var(--transition); }
        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 2.5px; color: #555; margin-bottom: 20px; font-weight: 900; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 10px; font-weight: 700; }

        input, textarea, select { width: 100%; padding: 18px; background: #000; border: 1px solid #1a1a1a; border-radius: 8px; color: #fff; box-sizing: border-box; font-size: 14px; transition: border-color 0.3s; }
        input:focus, select:focus { border-color: #333; outline: none; }
        
        /* CUSTOM DROPDOWN UI */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 16px;
            padding-right: 45px;
        }
        select:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23666666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        }

        .btn-main { position: relative; overflow: hidden; width: 100%; padding: 20px; background: #fff; color: #000; border: none; border-radius: 50px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
        .btn-main:hover { transform: scale(1.02); background: #f0f0f0; }
        .btn-gold { background: var(--accent-gold); color: #000; }
        .btn-split { flex: 1; padding: 15px; background: #111; color: #fff; border: 1px solid #333; border-radius: 8px; cursor: pointer; font-size: 11px; text-transform: uppercase; font-weight: 800; transition: 0.2s; }
        
        #staging-gallery { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .thumb-wrapper { position: relative; aspect-ratio: 1/1; border-radius: 6px; overflow: hidden; border: 1px solid #222; background: #050505; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .remove-thumb { position: absolute; top: 2px; right: 2px; background: rgba(255, 77, 77, 0.9); color: white; border: none; border-radius: 4px; width: 18px; height: 18px; font-size: 10px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* LUXURY PROGRESS BAR ANIMATION */
        .btn-loading {
            pointer-events: none;
            opacity: 0.9;
        }
        .btn-loading::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            width: 30%;
            background: #000;
            border-radius: 4px;
            animation: loadingBarSlide 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        .btn-main:not(.btn-gold).btn-loading::after {
            background: var(--accent-gold);
        }
        @keyframes loadingBarSlide {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 50%; }
            100% { transform: translateX(350%); width: 30%; }
        }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        
        /* NEW WHITE TRANSITION OVERLAY */
        #transition-overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #ffffff; 
            z-index: 3000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.8s cubic-bezier(0.165, 0.84, 0.44, 1); 
        }
        .pulse-logo { animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.4; transform: scale(0.98); } }

        #load-more-container { text-align: center; margin-top: 10px; margin-bottom: 30px; }
        .btn-load-more { background: none; border: 1px solid #222; color: #666; padding: 10px 20px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; }

        @media (min-width: 768px) {
            .bottom-nav {
                top: 0; bottom: auto; left: 50%; transform: translateX(-50%);
                width: auto; height: 70px; background: transparent; border-top: none; gap: 50px;
            }
            .nav-item { flex-direction: row; gap: 8px; }
            .nav-icon { margin-bottom: 0; font-size: 16px; }
            #app-container { margin-bottom: 50px; }
            
            /* DESKTOP HIDE CAMERA BUTTON */
            #btn-camera-upload { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="transition-overlay" style="display: none;">
        <img src="https://premiereflow.com/logo.png" class="pulse-logo" style="width: 180px; filter: brightness(0);">
    </div>

    <div id="login-overlay">
        <div style="width: 100%; max-width: 380px; padding: 30px; text-align: center;">
            <img src="https://premiereflow.com/logo.png" style="width: 160px; margin-bottom: 50px;">
            <div style="text-align: left; margin-bottom: 15px;">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="name@company.com">
            </div>
            <div style="text-align: left; margin-bottom: 25px;">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn-main" id="login-btn" onclick="portalAuth()">Unlock Dashboard</button>
            <p id="auth-error" style="color: #ff4d4d; font-size: 11px; margin-top: 25px; display: none; font-weight: 700;"></p>
        </div>
    </div>

    <header id="main-header" style="display: none;">
        <div class="header-left">
            <img src="https://premiereflow.com/logo.png" alt="Premiere Flow">
        </div>
        <div class="header-right">
            <span class="user-email" id="header-email">---</span>
            <span class="user-credits" id="header-credits">0 CREDITS</span>
        </div>
    </header>

    <div id="app-container" style="display: none;">
        
        <section id="view-dashboard" class="view-section active">
            <div style="margin-bottom: 40px;">
                <button class="btn-main btn-gold" id="action-btn" onclick="openSubmit()">New Production</button>
            </div>
            <h3>Dashboard</h3>
            <div id="submissions-list">
                </div>
            <div id="load-more-container" style="display:none;">
                <button class="btn-load-more" id="load-more-btn" onclick="fetchMoreHistory()">Load More</button>
            </div>
        </section>

        <section id="view-notifications" class="view-section">
            <h3>Recent Activity</h3>
            <div id="notif-list">
                <div class="card" style="border-left: 3px solid var(--accent-gold);">
                    <p style="font-size: 12px; margin: 0; line-height: 1.5;"><b>System:</b> Credentials verified. Welcome back.</p>
                    <span style="font-size: 9px; color: #444; display: block; margin-top: 10px; font-weight: 800; text-transform: uppercase;">Just Now</span>
                </div>
            </div>
        </section>

        <section id="view-profile" class="view-section">
            <div class="card">
                <h3>Brand Identity</h3>
                <label>Account Logo</label>
                <div id="logo-preview" style="width: 120px; height: 120px; border: 1px dashed #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 15px 0; background-color: #050505; overflow: hidden; padding: 10px;">
                    <span id="no-logo-text" style="font-size: 9px; color: #333; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">No Logo</span>
                    <img id="actual-logo-img" src="" style="display: none; max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 6px;">
                </div>
                <input type="file" id="field-logoUpload" accept="image/*" style="display: none;" onchange="handleLogoSelect(this)">
                <div style="display: flex; gap: 10px;">
                    <button id="trigger-upload-btn" onclick="document.getElementById('field-logoUpload').click()" class="btn-split">Update Logo</button>
                    <button id="save-logo-btn" onclick="uploadNewLogo()" style="display: none;" class="btn-split">Save to Profile</button>
                </div>
            </div>
            
            <div class="card">
                <h3>Account Details</h3>
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span style="font-size: 11px; color: #555; text-transform: uppercase; font-weight: 800;">Tier</span>
                    <span id="profile-tier" style="font-size: 11px; font-weight: 900; color: var(--accent-gold);">---</span>
                </div>
                <button class="btn-main" onclick="signOut()" style="background: transparent; border: 1px solid #222; color: #666; font-size: 10px; padding: 12px;">Sign Out</button>
            </div>
        </section>

        <section id="view-submit" class="view-section">
            <div style="margin-bottom: 25px;">
                <button onclick="showTab('dashboard')" style="background:none; border:none; color:#666; font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:1px; cursor:pointer;">← Cancel Production</button>
            </div>
            <div class="card">
                <form id="inventory-form">
                    <div class="form-group">
                        <label>Vehicle Name (Year Make Model) <span style="color: #ff4d4d; font-size: 8px;">*REQUIRED</span></label>
                        <input type="text" id="f-name" required placeholder="e.g. 2024 Kia K4">
                    </div>

                    <div class="form-group" style="background: #050505; padding: 20px; border-radius: 12px; border: 1px solid #1a1a1a;">
                        <label>Asset Link (Listing or Folder URL)</label>
                        <input type="text" id="f-source" placeholder="Paste listing, Drive, or Dropbox link here...">
                        
                        <div style="text-align: center; margin: 20px 0; color: #444; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;">— OR —</div>
                        
                        <label>Direct Upload (Max 10 Photos)</label>
                        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                            <button type="button" id="btn-camera-upload" class="btn-split" onclick="document.getElementById('f-camera').click()">📷 Camera</button>
                            <button type="button" class="btn-split" onclick="document.getElementById('f-gallery').click()">📁 Gallery</button>
                        </div>
                        <div id="staging-gallery"></div>
                        <input type="file" id="f-camera" accept="image/*" capture="environment" style="display: none;" onchange="stageFiles(this)">
                        <input type="file" id="f-gallery" multiple accept="image/*" style="display: none;" onchange="stageFiles(this)">
                    </div>

                    <div style="display: flex; gap: 15px; margin-bottom: 25px;">
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label>Showroom Color</label>
                            <input type="text" id="f-color" placeholder="Leave blank for Default White...">
                        </div>
                        
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label id="logo-label-text">Logo Placement</label>
                            <select id="f-logo">
                                <option value="Bottom Left" selected>Bottom Left</option>
                                <option value="Bottom Right">Bottom Right</option>
                                <option value="Top Right">Top Right</option>
                                <option value="Top Left">Top Left</option>
                                <option value="Showroom Wall">Showroom Wall</option>
                                <option value="No Logo">No Logo</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" id="submit-btn" class="btn-main btn-gold">Begin Staging</button>
                </form>
            </div>
        </section>
    </div>

    <nav class="bottom-nav" id="bottom-nav" style="display: none;">
        <div class="nav-item active" id="nav-dashboard" onclick="showTab('dashboard')">
            <span class="nav-icon">▤</span>
            <span>Dashboard</span>
        </div>
        <div class="nav-item" id="nav-notifications" onclick="showTab('notifications')">
            <span class="nav-icon">◈</span>
            <span>Alerts</span>
        </div>
        <div class="nav-item" id="nav-profile" onclick="showTab('profile')">
            <span class="nav-icon">👤</span>
            <span>Account</span>
        </div>
    </nav>

    <script>
        let userData = { history: [] };
        let stagedFiles = [];
        let historyPage = 1;
        const loginWebhook = 'https://hook.us2.make.com/ysngiu1djqh8wagjtn15rgzpwnwd9leu';

        window.onload = function() {
            const savedEmail = localStorage.getItem('pf_email');
            const savedPass = localStorage.getItem('pf_pass');
            if (savedEmail && savedPass) {
                document.getElementById('login-email').value = savedEmail;
                document.getElementById('login-password').value = savedPass;
                
                // If returning user, immediately show the white transition screen to hide the login form
                document.getElementById('transition-overlay').style.display = 'flex';
                document.getElementById('transition-overlay').style.opacity = '1';
                portalAuth();
            }
        };

        async function portalAuth() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const error = document.getElementById('auth-error');
            const btn = document.getElementById('login-btn');
            const transitionOverlay = document.getElementById('transition-overlay');
            
            if(!email || !pass) return;

            // Trigger the luxury white transition instantly
            transitionOverlay.style.display = 'flex';
            transitionOverlay.style.opacity = '1';
            error.style.display = 'none';
            
            try {
                const res = await fetch(loginWebhook, {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: email, password: pass, page: 1 })
                });

                const data = await res.json();
                
                if (data.success) {
                    userData = data;
                    localStorage.setItem('pf_email', email);
                    localStorage.setItem('pf_pass', pass);
                    
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-header').style.display = 'flex';
                    document.getElementById('app-container').style.display = 'block';
                    document.getElementById('bottom-nav').style.display = 'flex';
                    
                    refreshUI();

                    // Smoothly fade out the white transition screen
                    transitionOverlay.style.opacity = '0';
                    setTimeout(() => { transitionOverlay.style.display = 'none'; }, 800);

                } else {
                    // Auth failed, hide transition and show error
                    transitionOverlay.style.display = 'none';
                    error.innerText = data.error || "INVALID CREDENTIALS.";
                    error.style.display = 'block';
                }
            } catch (err) {
                // Connection failed
                transitionOverlay.style.display = 'none';
                error.innerText = "CONNECTION ERROR.";
                error.style.display = 'block';
            }
        }

        function signOut() {
            localStorage.clear();
            window.location.reload(); 
        }

        function refreshUI() {
            document.getElementById('header-email').innerText = (userData.email || 'Authorized Dealer').toUpperCase();
            document.getElementById('header-credits').innerText = Math.round(userData.credits || 0) + ' CREDITS';
            document.getElementById('profile-tier').innerText = (userData.tier || '---').toUpperCase();
            
            const actualImg = document.getElementById('actual-logo-img');
            const noLogoText = document.getElementById('no-logo-text');
            const logoSelect = document.getElementById('f-logo');
            const logoLabel = document.getElementById('logo-label-text');
            
            if(userData.logo && userData.logo !== "" && userData.logo !== "undefined") {
                actualImg.src = userData.logo;
                actualImg.style.display = 'block';
                noLogoText.style.display = 'none';
                
                logoSelect.disabled = false;
                logoLabel.innerHTML = 'Logo Placement';
            } else {
                logoSelect.value = 'No Logo';
                logoSelect.disabled = true;
                logoLabel.innerHTML = 'Logo Placement <span style="color: #ff4d4d; font-size: 8px;">*ADD IN PROFILE</span>';
            }

            const list = document.getElementById('submissions-list');
            
            const validHistory = (userData.history || []).filter(item => {
                if (!item) return false;
                const vName = item.vehicle || item.name || item.vehicleName || item['Vehicle Name'] || item['Vehicle'] || "";
                const cleanName = String(vName).trim().toLowerCase();
                
                if (cleanName === "" || cleanName === "unknown vehicle" || cleanName === "null" || cleanName === "undefined") {
                    return false;
                }
                return true;
            });
            
            if(validHistory.length > 0) {
                list.innerHTML = validHistory.map(item => {
                    const thumb = item.thumbnail && item.thumbnail !== "" ? item.thumbnail : '';
                    const displayName = item.vehicle || item.name || item.vehicleName || item['Vehicle Name'] || item['Vehicle'] || 'Unknown Vehicle';
                    
                    return `
                    <div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <div style="display:flex; align-items:center; gap:12px;">
                            ${thumb ? `<img src="${thumb}" style="width:40px; height:40px; object-fit:cover; border-radius:6px; border:1px solid #222;">` : `<div style="width:40px; height:40px; background:#000; border:1px solid #222; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:10px; color:#333;">PF</div>`}
                            <div>
                                <p style="margin:0; font-weight:800; font-size:13px; color:#fff;">${displayName}</p>
                                <span style="font-size:9px; color:#444; font-weight:700;">${item.date || item.Date || 'Just Now'}</span>
                            </div>
                        </div>
                        <span style="font-size:10px; color:var(--accent-gold); font-weight:900;">${(item.status || item.Status || 'Received').toUpperCase()}</span>
                    </div>
                `}).join('');
            } else {
                list.innerHTML = `
                    <div class="card" style="text-align:center; padding: 60px 20px; border: 1px dashed #1a1a1a; background: #050505;">
                        <div style="font-size: 30px; margin-bottom: 20px; opacity: 0.3;">🏎️</div>
                        <p style="color: #fff; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px;">Your Showroom is Empty</p>
                        <p style="color: #444; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; line-height: 1.6;">
                            Start your first staging to see your inventory here.<br>
                            Click <span style="color: var(--accent-gold);">"NEW PRODUCTION"</span> to begin.
                        </p>
                    </div>
                `;
            }
        }

        function addAlert(msg) {
            const list = document.getElementById('notif-list');
            const alert = document.createElement('div');
            alert.className = 'card';
            alert.style.borderLeft = '3px solid var(--accent-gold)';
            alert.innerHTML = `
                <p style="font-size: 12px; margin: 0; line-height: 1.5;">${msg}</p>
                <span style="font-size: 9px; color: #444; display: block; margin-top: 10px; font-weight: 800; text-transform: uppercase;">Just Now</span>
            `;
            list.prepend(alert);
        }

        function showTab(t) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            const nav = document.getElementById('nav-' + t);
            if(nav) nav.classList.add('active');
            window.scrollTo(0,0);
        }

        function openSubmit() {
            if(userData.credits <= 0) { alert("INSUFFICIENT CREDITS."); return; }
            showTab('submit');
        }

        function stageFiles(input) {
            const incoming = Array.from(input.files);
            incoming.forEach(f => { if (stagedFiles.length < 10) stagedFiles.push(f); });
            renderGallery();
        }

        function renderGallery() {
            const cont = document.getElementById('staging-gallery');
            cont.innerHTML = '';
            stagedFiles.forEach((f, i) => {
                const url = URL.createObjectURL(f);
                const wrap = document.createElement('div');
                wrap.className = 'thumb-wrapper';
                wrap.innerHTML = `<img src="${url}"><button type="button" class="remove-thumb" onclick="removePhoto(${i})">✕</button>`;
                cont.appendChild(wrap);
            });
        }

        function removePhoto(i) { stagedFiles.splice(i, 1); renderGallery(); }

        document.getElementById('inventory-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            
            btn.classList.add('btn-loading');
            btn.innerText = 'UPLOADING ASSETS...'; 
            btn.disabled = true;

            const vehicleName = document.getElementById('f-name').value.trim();
            const assetLink = document.getElementById('f-source').value.trim();

            if (assetLink === "" && stagedFiles.length === 0) {
                alert("Please provide an Asset Link OR Direct Upload photos.");
                btn.classList.remove('btn-loading');
                btn.innerText = "Begin Staging";
                btn.disabled = false;
                return;
            }

            let tempThumbnail = null;
            if (stagedFiles.length > 0) tempThumbnail = URL.createObjectURL(stagedFiles[0]);

            const formData = new FormData();
            const activeID = userData.accountId || userData.accountID;
            formData.append('accountId', activeID);
            formData.append('vehicleName', vehicleName);
            formData.append('assetSource', assetLink);
            
            const colorInput = document.getElementById('f-color').value.trim();
            const finalColor = colorInput === "" ? "White" : colorInput;
            formData.append('showroomColor', finalColor);
            
            formData.append('logoPlacement', document.getElementById('f-logo').value);
            
            stagedFiles.forEach(f => formData.append('uploadAssets', f));

            try {
                await fetch('https://hook.us2.make.com/ffvrlwmhkukr66bmik4obd0c1ymi2sso', { method: 'POST', body: formData });
                
                if (!userData.history) userData.history = [];
                userData.history.unshift({
                    vehicle: vehicleName,
                    date: new Date().toLocaleDateString(),
                    status: "Received",
                    thumbnail: tempThumbnail
                });
                
                addAlert(`<b>Staging:</b> ${vehicleName} has been queued for production.`);
                
                document.getElementById('inventory-form').reset();
                stagedFiles = [];
                renderGallery();
                
                btn.classList.remove('btn-loading');
                btn.innerText = "Begin Staging";
                btn.disabled = false;
                
                refreshUI();
                showTab('dashboard');

            } catch (err) { 
                alert("SUBMISSION FAILED."); 
                btn.classList.remove('btn-loading');
                btn.disabled = false; 
                btn.innerText = "Begin Staging"; 
            }
        });

        function handleLogoSelect(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const actualImg = document.getElementById('actual-logo-img');
                    actualImg.src = e.target.result;
                    actualImg.style.display = 'block';
                    document.getElementById('no-logo-text').style.display = 'none';
                    document.getElementById('save-logo-btn').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function uploadNewLogo() {
            const file = document.getElementById('field-logoUpload').files[0];
            const btn = document.getElementById('save-logo-btn');
            const formData = new FormData();
            const activeID = userData.accountId || userData.accountID;
            formData.append('logoFile', file);
            formData.append('accountId', activeID);
            
            btn.classList.add('btn-loading');
            btn.innerText = 'SAVING...';
            try {
                const res = await fetch('https://hook.us2.make.com/axjf83eeowlrxkqpho7f3mhn4r9xqo5h', { method: 'POST', body: formData });
                if (res.ok) {
                    userData.logo = URL.createObjectURL(file);
                    refreshUI();
                    btn.classList.remove('btn-loading');
                    btn.innerText = "SUCCESS";
                    setTimeout(() => { btn.style.display = 'none'; btn.innerText = "Save to Profile"; }, 2000);
                }
            } catch (err) { 
                alert("UPLOAD FAILED.");
                btn.classList.remove('btn-loading');
                btn.innerText = "Save to Profile";
            }
        }
    </script>
</body>
</html>
