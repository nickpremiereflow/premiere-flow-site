<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premiere Flow | Portal</title>
    
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --primary-black: #000000;
            --accent-gold: #c5a059;
            --bg-dark: #000000;
            --card-bg: #0a0a0a;
            --text-white: #ffffff;
            --text-dim: #666;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- PERSISTENT HEADER --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .header-left img { height: 22px; border: none; }
        .header-right { text-align: right; }
        .user-email { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        .user-credits { font-size: 11px; color: var(--accent-gold); font-weight: 900; display: block; margin-top: 3px; letter-spacing: 0.5px; }

        /* --- MAIN APP CONTAINER --- */
        #app-container {
            margin-top: 90px;
            margin-bottom: 100px;
            padding: 0 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- NAVIGATION --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: #050505;
            border-top: 1px solid #111;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #444;
            text-decoration: none;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 800;
        }

        .nav-item.active { color: #fff; }
        .nav-icon { font-size: 22px; margin-bottom: 6px; }

        /* --- UI COMPONENTS --- */
        .view-section { display: none; }
        .view-section.active { display: block; }

        .card {
            background: var(--card-bg);
            border: 1px solid #111;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 2.5px; color: #555; margin-bottom: 20px; font-weight: 900; }

        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 10px; font-weight: 700; }

        input, textarea {
            width: 100%;
            padding: 18px;
            background: #000;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #333; outline: none; }

        /* --- BUTTONS --- */
        .btn-main {
            width: 100%;
            padding: 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-main:hover { transform: scale(1.02); background: #f0f0f0; }

        .btn-gold { background: var(--accent-gold); color: #000; }

        .logo-preview-box {
            width: 120px;
            height: 120px;
            border: 1px dashed #222;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #050505;
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center;
        }

        /* Desktop Adjustments */
        @media (min-width: 800px) {
            .bottom-nav { top: 0; bottom: auto; left: 50%; transform: translateX(-50%); width: auto; background: none; border: none; height: 70px; padding: 0; }
            .nav-item { margin: 0 25px; }
            header { padding: 0 15%; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="width: 100%; max-width: 380px; padding: 30px; text-align: center;">
            <img src="https://premiereflow.com/logo.png" style="width: 160px; margin-bottom: 50px;">
            <div style="text-align: left; margin-bottom: 25px;">
                <label>Portal Access ID</label>
                <input type="text" id="login-id" placeholder="PF-XXXX-XXXX">
            </div>
            <button class="btn-main" onclick="portalAuth()">Unlock Studio</button>
            <p id="auth-error" style="color: #ff4d4d; font-size: 11px; margin-top: 25px; display: none; font-weight: 700;"></p>
        </div>
    </div>

    <header id="main-header" style="display: none;">
        <div class="header-left">
            <img src="https://premiereflow.com/logo.png" alt="Premiere Flow">
        </div>
        <div class="header-right">
            <span class="user-email" id="header-email">NOT LOGGED IN</span>
            <span class="user-credits" id="header-credits">0 CREDITS</span>
        </div>
    </header>

    <div id="app-container" style="display: none;">
        
        <section id="view-dashboard" class="view-section active">
            <div style="margin-bottom: 40px;">
                <button class="btn-main btn-gold" id="action-btn" onclick="openSubmit()">New Production</button>
            </div>
            <h3>Active Pipeline</h3>
            <div id="submissions-list">
                <div class="card" style="text-align:center; border: 1px dashed #1a1a1a;">
                    <p style="color: #444; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">No vehicles in staging.</p>
                </div>
            </div>
        </section>

        <section id="view-notifications" class="view-section">
            <h3>Recent Activity</h3>
            <div id="notif-list">
                <div class="card" style="border-left: 3px solid var(--accent-gold);">
                    <p style="font-size: 12px; margin: 0; line-height: 1.5;"><b>System:</b> Studio credentials verified. Welcome to Premiere Flow.</p>
                    <span style="font-size: 9px; color: #444; display: block; margin-top: 10px; font-weight: 800; text-transform: uppercase;">Just Now</span>
                </div>
            </div>
        </section>

        <section id="view-profile" class="view-section">
            <div class="card">
                <h3>Brand Identity</h3>
                <label>Account Logo (Transparent PNG Preferred)</label>
                <div id="logo-preview" class="logo-preview-box">
                    <span id="no-logo-text" style="font-size: 9px; color: #333; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">No Logo Found</span>
                </div>
                
                <input type="file" id="field-logoUpload" accept="image/*" style="display: none;" onchange="handleLogoSelect(this)">
                
                <div style="display: flex; gap: 10px;">
                    <button onclick="document.getElementById('field-logoUpload').click()" style="flex: 1; padding: 12px; font-size: 10px; background: #111; color: #fff; border: none; border-radius: 6px; font-weight: 800; text-transform: uppercase; cursor: pointer;">Select File</button>
                    <button id="save-logo-btn" onclick="uploadNewLogo()" style="display: none; flex: 1; padding: 12px; font-size: 10px; background: var(--accent-gold); color: #000; border: none; border-radius: 6px; font-weight: 800; text-transform: uppercase; cursor: pointer;">Save Logo</button>
                </div>
            </div>
            
            <div class="card">
                <h3>Subscription Details</h3>
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span style="font-size: 11px; color: #555; text-transform: uppercase; font-weight: 800;">Tier</span>
                    <span id="profile-tier" style="font-size: 11px; font-weight: 900; color: var(--accent-gold);">---</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="font-size: 11px; color: #555; text-transform: uppercase; font-weight: 800;">Status</span>
                    <span style="font-size: 11px; font-weight: 900; color: #4ade80;">ACTIVE</span>
                </div>
            </div>
        </section>

        <section id="view-submit" class="view-section">
            <div style="margin-bottom: 25px;">
                <button onclick="showTab('dashboard')" style="background:none; border:none; color:#666; font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:1px; cursor:pointer;">← Cancel Production</button>
            </div>
            <div class="card">
                <form id="inventory-form">
                    <div class="form-group">
                        <label>Vehicle Name (Year Make Model)</label>
                        <input type="text" id="f-name" required placeholder="e.g. 2024 Kia K4">
                    </div>
                    <div class="form-group">
                        <label>Asset Source (Listing URL)</label>
                        <input type="text" id="f-source" placeholder="Paste link here...">
                    </div>
                    <div style="text-align:center; margin: 10px 0; font-size: 9px; font-weight: 900; color: #222;">- OR -</div>
                    <div class="form-group">
                        <label>Camera Capture</label>
                        <input type="file" id="f-files" multiple accept="image/*" capture="environment" style="border: 1px dashed #222; padding: 15px; font-size: 11px; color: #444;">
                    </div>
                    <div class="form-group" style="margin-top: 30px;">
                        <label>Showroom Styles / Special Notes</label>
                        <textarea id="f-notes" rows="3" placeholder="Notes for the studio team..."></textarea>
                    </div>
                    <button type="submit" id="submit-btn" class="btn-main">Begin Staging</button>
                </form>
            </div>
        </section>

    </div>

    <nav class="bottom-nav" id="bottom-nav" style="display: none;">
        <div class="nav-item active" id="nav-dashboard" onclick="showTab('dashboard')">
            <span class="nav-icon">▤</span>
            <span>Dashboard</span>
        </div>
        <div class="nav-item" id="nav-notifications" onclick="showTab('notifications')">
            <span class="nav-icon">◈</span>
            <span>Alerts</span>
        </div>
        <div class="nav-item" id="nav-profile" onclick="showTab('profile')">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </div>
    </nav>

    <script>
        let userData = {};

        // 1. AUTHENTICATION LOGIC
        async function portalAuth() {
            const id = document.getElementById('login-id').value;
            const error = document.getElementById('auth-error');
            
            try {
                const res = await fetch('https://hook.us2.make.com/3fo42xcb1acfxniws2bblqoid56go4r1', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ accountID: id })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    userData = data;
                    userData.accountID = id; // Store ID for subsequent calls
                    
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-header').style.display = 'flex';
                    document.getElementById('app-container').style.display = 'block';
                    document.getElementById('bottom-nav').style.display = 'flex';
                    
                    refreshUI();
                } else {
                    error.innerText = "ACCESS DENIED. CHECK ID.";
                    error.style.display = 'block';
                }
            } catch (err) {
                error.innerText = "CONNECTION TIMEOUT.";
                error.style.display = 'block';
            }
        }

        // 2. TAB SWITCHING
        function showTab(t) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('view-' + t).classList.add('active');
            if(t !== 'submit') document.getElementById('nav-' + t).classList.add('active');
            window.scrollTo(0,0);
        }

        function openSubmit() {
            if(userData.credits <= 0) {
                alert("INSUFFICIENT CREDITS. PLEASE REFILL.");
                return;
            }
            showTab('submit');
        }

        // 3. UI REFRESH
        function refreshUI() {
            document.getElementById('header-email').innerText = (userData.email || 'Authorized Dealer').toUpperCase();
            document.getElementById('header-credits').innerText = Math.round(userData.credits) + ' CREDITS';
            document.getElementById('profile-tier').innerText = userData.tier.toUpperCase();
            
            if(userData.logo) {
                document.getElementById('logo-preview').style.backgroundImage = `url('${userData.logo}')`;
                document.getElementById('no-logo-text').style.display = 'none';
            }

            const actionBtn = document.getElementById('action-btn');
            if(userData.credits <= 0) {
                actionBtn.innerText = "Refill Credits";
                actionBtn.style.background = "#1a1a1a";
                actionBtn.style.color = "#444";
            }
        }

        // 4. LOGO UPLOAD LOGIC
        function handleLogoSelect(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('logo-preview');
                    preview.style.backgroundImage = `url('${e.target.result}')`;
                    document.getElementById('no-logo-text').style.display = 'none';
                    document.getElementById('save-logo-btn').style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function uploadNewLogo() {
            const fileInput = document.getElementById('field-logoUpload');
            const file = fileInput.files[0];
            const btn = document.getElementById('save-logo-btn');
            
            if (!file) return;

            btn.innerText = "LOCKED..."; btn.disabled = true;

            const formData = new FormData();
            formData.append('logoFile', file);
            formData.append('accountID', userData.accountID);

            try {
                const res = await fetch('https://hook.us2.make.com/axjf83eeowlrxkqpho7f3mhn4r9xqo5h', {
                    method: 'POST',
                    body: formData
                });
                if (res.ok) {
                    btn.innerText = "SUCCESS";
                    setTimeout(() => { btn.style.display = 'none'; btn.innerText = "SAVE LOGO"; btn.disabled = false; }, 2000);
                }
            } catch (err) {
                btn.innerText = "RETRY"; btn.disabled = false;
            }
        }

        // 5. PRODUCTION SUBMISSION
        document.getElementById('inventory-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "QUEUEING..."; btn.disabled = true;

            const payload = {
                accountID: userData.accountID,
                vehicleName: document.getElementById('f-name').value,
                assetSource: document.getElementById('f-source').value,
                showroomNotes: document.getElementById('f-notes').value
            };

            await fetch('https://hook.us2.make.com/ffvrlwmhkukr66bmik4obd0c1ymi2sso', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            showTab('dashboard');
            
            // Local Notification Mock
            const notif = document.getElementById('notif-list');
            notif.innerHTML = `<div class="card" style="border-left: 3px solid #fbbf24;">
                <p style="font-size:12px; margin:0;"><b>Staging Initiated:</b> ${payload.vehicleName} has entered the studio.</p>
                <span style="font-size:9px; color:#444; display:block; margin-top:10px; font-weight:800; text-transform:uppercase;">Just Now</span>
            </div>` + notif.innerHTML;
        });
    </script>
</body>
</html>
