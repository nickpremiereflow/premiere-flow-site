<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Inventory | Premiere Flow</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --primary-black: #000000;
            --accent-gold: #c5a059;
            --bg-dark: #000000;
            --text-white: #ffffff;
            --input-bg: #0a0a0a;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .submit-container {
            width: 100%;
            max-width: 480px;
            padding: 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        .logo-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-header img {
            width: 180px;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #666;
        }

        input, textarea {
            width: 100%;
            padding: 16px;
            background: var(--input-bg);
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
            transition: var(--transition);
        }

        button {
            width: 100%;
            padding: 18px;
            background: white;
            color: black;
            border: none;
            border-radius: 4px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        #error-message {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 20px;
            text-align: center;
            display: none;
            line-height: 1.5;
        }

        #submission-portal, #success-view {
            display: none;
            animation: fadeInUp 0.6s ease-out;
        }

        /* Success View Styling */
        .success-icon {
            font-size: 3rem;
            color: var(--accent-gold);
            margin-bottom: 20px;
            text-align: center;
        }

        .success-title {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-align: center;
        }

        .success-message {
            color: #888;
            text-align: center;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        #account-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: #050505;
            border: 1px solid #111;
            border-radius: 12px;
        }

        .owner-label { font-size: 9px; text-transform: uppercase; letter-spacing: 3px; color: #555; margin-bottom: 8px; }
        #owner-display { font-size: 1.5rem; font-weight: 400; color: #fff; margin-bottom: 15px; }
        #credits-display { font-size: 11px; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 2px; border-top: 1px solid #1a1a1a; display: inline-block; padding-top: 15px; }
        .hidden-tier-field { display: none; }
    </style>
</head>
<body>

<div class="submit-container">
    <div class="logo-header">
        <img src="https://premiereflow.com/logo.png" alt="Premiere Flow">
    </div>

    <div id="validation-stage">
        <h2>Unlock Portal</h2>
        <div class="form-group">
            <label for="account-id">Account ID</label>
            <input type="text" id="account-id" placeholder="PF-XXXX-XXXX">
        </div>
        <button onclick="validateID()">Unlock Submission Portal</button>
        <p id="error-message"></p>
    </div>

    <div id="submission-portal">
        <div id="account-header">
            <div class="owner-label">Account Owner</div>
            <div id="owner-display">---</div>
            <div id="credits-display">0 Credits Remaining</div>
        </div>

        <form id="inventory-form">
            <input type="hidden" id="hidden-id" name="accountID">
            <input type="hidden" id="hidden-tier" name="tier">
            
            <div class="form-group">
                <label>Inventory / Listing Link</label>
                <input type="text" name="listingUrl" placeholder="dealership.com/car-link">
            </div>

            <div class="form-group">
                <label>Photo Folder (Dropbox/Drive)</label>
                <input type="text" name="photoFolder" placeholder="Link to raw assets">
            </div>

            <div id="branding-fields" class="hidden-tier-field">
                <div class="form-group">
                    <label>Logo Files (for Watermarks)</label>
                    <input type="text" name="logoFiles" placeholder="Link to PNG/SVG logos">
                </div>
                <div class="form-group">
                    <label>Branding Notes</label>
                    <textarea name="brandingNotes" rows="3" placeholder="Specific instructions..."></textarea>
                </div>
            </div>

            <button type="submit" id="submit-btn">Submit for Production</button>
        </form>
    </div>

    <div id="success-view">
        <div class="success-icon">✦</div>
        <div class="success-title">Submission Received</div>
        <p class="success-message">
            Your inventory has been queued for production. Our team is now reviewing your assets to ensure brand alignment. You will receive an email once your high-fidelity media is ready for review.
        </p>
        <button onclick="location.reload()">Submit Another Vehicle</button>
    </div>
</div>

<script>
    // 1. HANDLE FORM SUBMISSION TO MAKE.COM
    document.getElementById('inventory-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const listing = document.querySelector('input[name="listingUrl"]').value.trim();
        const folder = document.querySelector('input[name="photoFolder"]').value.trim();
        const errorMsg = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');

        if (!listing && !folder) {
            errorMsg.innerText = "Please provide either a Listing Link or a Photo Folder.";
            errorMsg.style.display = 'block';
            return;
        }

        submitBtn.innerText = "Securing Assets...";
        submitBtn.disabled = true;

        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('https://hook.us2.make.com/ffvrlwmhkukr66bmik4obd0c1ymi2sso', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                document.getElementById('submission-portal').style.display = 'none';
                document.getElementById('success-view').style.display = 'block';
                document.getElementById('error-message').style.display = 'none';
            } else {
                throw new Error('Submission failed');
            }
        } catch (error) {
            submitBtn.innerText = "Submit for Production";
            submitBtn.disabled = false;
            errorMsg.innerText = "Submission failed. Please try again.";
            errorMsg.style.display = 'block';
        }
    });

    // 2. BOUNCER VALIDATION (UNLOCK)
    async function validateID() {
        const id = document.getElementById('account-id').value;
        const errorMsg = document.getElementById('error-message');
        const webhookUrl = 'https://hook.us2.make.com/3fo42xcb1acfxniws2bblqoid56go4r1';

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ accountID: id })
            });
            
            const data = await response.json();

            if (data.status === 'success') {
                document.getElementById('validation-stage').style.display = 'none';
                document.getElementById('submission-portal').style.display = 'block';
                document.getElementById('error-message').style.display = 'none';
                
                document.getElementById('hidden-id').value = id;
                document.getElementById('hidden-tier').value = data.tier;
                document.getElementById('owner-display').innerText = data.accountOwner || 'Authorized Dealer';
                
                const roundedCredits = Math.round(data.credits);
                document.getElementById('credits-display').innerText = `${roundedCredits} Credits Remaining`;
                
                if (data.tier !== 'Upgrade') {
                    document.getElementById('branding-fields').style.display = 'block';
                }
            } else {
                errorMsg.innerText = data.message || "Invalid Account ID.";
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            errorMsg.innerText = "Connection error. Please try again.";
            errorMsg.style.display = 'block';
        }
    }
</script>

</body>
</html>
