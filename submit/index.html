<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Dashboard | Premiere Flow</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
    
    <style>
        :root {
            --primary-black: #000000;
            --accent-gold: #c5a059;
            --bg-dark: #000000;
            --card-bg: #0a0a0a;
            --text-white: #ffffff;
            --text-dim: #888;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            /* Added Inter as primary font to lock sizing */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            font-size: 16px; /* Global size increase */
        }

        /* --- GLOBAL HEADER (LOCKED AT 75px) --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 75px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid #111; display: flex; align-items: center;
            justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 1000;
        }

        /* 1. LOGO: TOP LEFT, VERTICALLY CENTERED */
        .header-left { 
            display: flex; 
            align-items: center; 
            height: 100%; 
            z-index: 1001; 
        }
        .logo-img { height: 22px; border: none; transition: 0.3s; }
        .logo-img:hover { opacity: 0.7; }

        /* 2. NAV: MATHEMATICALLY CENTERED */
        .header-nav { 
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            display: none; gap: 30px; align-items: center;
        }
        .nav-link { 
            color: #666; text-decoration: none; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; 
            cursor: pointer; line-height: 1; /* Ensures horizontal baseline alignment */
        }
        .nav-link:hover, .nav-link.active { color: #fff; }

        /* CONTACT ALIGNMENT FIX */
        .contact-wrapper { 
            display: flex; 
            align-items: center; 
            position: relative; 
        }

        .contact-bubble {
            visibility: hidden; background-color: #111; color: #fff; text-align: center; border-radius: 8px; 
            padding: 15px; position: absolute; z-index: 100;
            top: 40px; left: 50%; transform: translateX(-50%);
            border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: max-content; opacity: 0; transition: 0.3s; font-family: sans-serif;
        }
        .contact-bubble.show { visibility: visible; opacity: 1; top: 50px; }
        .contact-email { color: var(--accent-gold); text-decoration: none; font-size: 12px; font-weight: 600; margin-right: 10px; }
        .copy-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 9px; font-weight: 800; text-transform: uppercase; }

        /* 3. AUTH: TOP RIGHT */
        .header-right { 
            display: flex; flex-direction: column; align-items: flex-end; 
            justify-content: center; height: 100%; z-index: 1001; 
        }
        .user-email { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; display: block; margin-bottom: 3px; line-height: 1; }
        .user-credits { font-size: 12px; color: var(--accent-gold); font-weight: 900; line-height: 1; }

        /* --- DASHBOARD TAB MENU (BELOW HEADER) --- */
        .dash-menu {
            display: flex; justify-content: center; gap: 45px;
            margin-bottom: 45px; border-bottom: 1px solid #111;
            padding-bottom: 20px;
        }
        .tab-link {
            font-size: 12px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; color: #444; cursor: pointer; transition: 0.3s;
        }
        .tab-link.active { color: var(--accent-gold); }

        #app-container { margin-top: 120px; margin-bottom: 100px; padding: 0 20px; max-width: 650px; margin-left: auto; margin-right: auto; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* DASHBOARD COMPONENTS */
        .view-section { display: none; }
        .view-section.active { display: block; }
        .card { background: var(--card-bg); border: 1px solid #111; border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 4px 25px rgba(0,0,0,0.4); }
        h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 2.5px; color: #666; margin-bottom: 25px; font-weight: 900; }
        
        .form-group { margin-bottom: 30px; }
        label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 12px; font-weight: 700; }
        input, textarea, select { width: 100%; padding: 20px; background: #000; border: 1px solid #1a1a1a; border-radius: 10px; color: #fff; box-sizing: border-box; font-size: 16px; }
        
        .btn-main { position: relative; overflow: hidden; width: 100%; padding: 22px; background: #fff; color: #000; border: none; border-radius: 50px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn-gold { background: var(--accent-gold); color: #000; }
        .btn-split { flex: 1; padding: 18px; background: #111; color: #fff; border: 1px solid #333; border-radius: 10px; cursor: pointer; font-size: 12px; text-transform: uppercase; font-weight: 800; }
        
        .split-row { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }

        #staging-gallery { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 20px; }
        .thumb-wrapper { position: relative; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; border: 1px solid #222; background: #050505; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .remove-thumb { position: absolute; top: 4px; right: 4px; background: rgba(255, 77, 77, 0.95); color: white; border: none; border-radius: 5px; width: 22px; height: 22px; font-size: 12px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .btn-loading { pointer-events: none; opacity: 0.9; }
        .btn-loading::after { content: ''; position: absolute; bottom: 0; left: 0; height: 4px; width: 30%; background: #000; animation: loadingBarSlide 1.5s infinite; }
        @keyframes loadingBarSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

        /* OVERLAYS */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        #transition-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 3000; display: flex; opacity: 1; align-items: center; justify-content: center; transition: 0.8s; }
        .pulse-logo { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }

        @media (max-width: 768px) {
            header { padding: 0 20px; }
        }

        @media (min-width: 768px) {
            .header-nav { display: flex; }
            .split-row { flex-direction: row; }
        }
    </style>
</head>
<body>

    <div id="transition-overlay">
        <img src="https://premiereflow.com/logo.png" class="pulse-logo" style="width: 180px; filter: brightness(0);">
    </div>

    <div id="login-overlay">
        <div style="width: 100%; max-width: 380px; padding: 30px; text-align: center;">
            <a href="/"><img src="https://premiereflow.com/logo.png" style="width: 180px; margin-bottom: 50px; border: none;"></a>
            <div style="text-align: left; margin-bottom: 15px;">
                <label>Dealer Email</label>
                <input type="email" id="login-email" placeholder="name@dealership.com">
            </div>
            <div style="text-align: left; margin-bottom: 25px;">
                <label>Security Key</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn-main" id="login-btn" onclick="portalAuth()">Unlock Dashboard</button>
            <p id="auth-error" style="color: #ff4d4d; font-size: 12px; margin-top: 25px; display: none; font-weight: 700;"></p>
        </div>
    </div>

    <header id="main-header" style="display: none;">
        <div class="header-left">
            <a href="/"><img src="https://premiereflow.com/logo.png" alt="Premiere Flow" class="logo-img"></a>
        </div>

        <nav class="header-nav">
            <a href="/" class="nav-link">Home</a>
            <a href="/about/" class="nav-link">About</a>
            <div class="contact-wrapper">
                <span class="nav-link" id="contactBtn" onclick="toggleContact(event)">Contact</span>
                <div id="contactBubble" class="contact-bubble">
                    <span style="font-size: 9px; display: block; margin-bottom: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase;">Direct Line</span>
                    <a href="mailto:info@premiereflow.com" class="contact-email">info@premiereflow.com</a>
                    <button class="copy-btn" onclick="copyEmail()">COPY</button>
                </div>
            </div>
            <a href="/terms/" class="nav-link">Terms</a>
        </nav>

        <div class="header-right">
            <span class="user-email" id="header-email">---</span>
            <span class="user-credits" id="header-credits">0 CREDITS</span>
        </div>
    </header>

    <div id="app-container" style="display: none;">
        
        <nav class="dash-menu">
            <span class="tab-link active" id="tab-dashboard" onclick="showTab('dashboard')">Listings</span>
            <span class="tab-link" id="tab-notifications" onclick="showTab('notifications')">Alerts</span>
            <span class="tab-link" id="tab-profile" onclick="showTab('profile')">Account</span>
        </nav>

        <section id="view-dashboard" class="view-section active">
            <div style="margin-bottom: 40px;">
                <button class="btn-main btn-gold" id="action-btn" onclick="openSubmit()">New Production</button>
            </div>
            <h3>Active Listings</h3>
            <div id="submissions-list"></div>
        </section>

        <section id="view-notifications" class="view-section">
            <h3>Recent activity</h3>
            <div id="notif-list">
                <div class="card" style="border-left: 4px solid var(--accent-gold);">
                    <p style="font-size: 14px; margin: 0; line-height: 1.6;"><b>System:</b> Dashboard operational. Ready for staging.</p>
                    <span style="font-size: 10px; color: #555; display: block; margin-top: 12px; font-weight: 800;">Just Now</span>
                </div>
            </div>
        </section>

        <section id="view-profile" class="view-section">
            <div class="card">
                <h3>Brand Identity</h3>
                <label>Dealer Logo</label>
                <div id="logo-preview" style="width: 140px; height: 140px; border: 1px dashed #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 15px 0; background-color: #050505; overflow: hidden; padding: 15px;">
                    <span id="no-logo-text" style="font-size: 10px; color: #333; font-weight: 900; text-transform: uppercase;">No Logo Set</span>
                    <img id="actual-logo-img" src="" style="display: none; max-width: 100%; max-height: 100%; object-fit: contain;">
                </div>
                <input type="file" id="field-logoUpload" accept="image/*" style="display: none;" onchange="handleLogoSelect(this)">
                <div style="display: flex; gap: 15px;">
                    <button onclick="document.getElementById('field-logoUpload').click()" class="btn-split">Select Logo</button>
                    <button id="save-logo-btn" onclick="uploadNewLogo()" style="display: none;" class="btn-split">Save to Profile</button>
                </div>
            </div>
            
            <div class="card">
                <h3>Account Details</h3>
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <span style="font-size: 13px; color: #666; text-transform: uppercase; font-weight: 800;">Active Plan</span>
                    <span id="profile-tier" style="font-size: 13px; font-weight: 900; color: var(--accent-gold);">---</span>
                </div>
                <button class="btn-main" onclick="signOut()" style="background: transparent; border: 1px solid #222; color: #888; font-size: 11px;">End Session</button>
            </div>
        </section>

        <section id="view-submit" class="view-section">
            <div style="margin-bottom: 30px;">
                <button onclick="showTab('dashboard')" style="background:none; border:none; color:#ff4d4d; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:1px; cursor:pointer;">← Cancel Production</button>
            </div>
            <div class="card">
                <form id="inventory-form">
                    <div class="form-group">
                        <label>Vehicle Name (Year Make Model)</label>
                        <input type="text" id="f-name" required placeholder="e.g. 2024 Kia K4">
                    </div>
                    <div class="form-group" style="background: #050505; padding: 25px; border-radius: 12px; border: 1px solid #1a1a1a;">
                        <label>Asset URL</label>
                        <input type="text" id="f-source" placeholder="Listing or Folder link">
                        <div style="text-align: center; margin: 20px 0; color: #333; font-size: 10px; font-weight: 900;">OR</div>
                        <label>Direct Photo Upload (Max 10)</label>
                        <div style="display: flex; gap: 12px; margin-bottom: 15px;">
                            <button type="button" id="btn-camera-upload" class="btn-split" onclick="document.getElementById('f-camera').click()">📷 Camera</button>
                            <button type="button" class="btn-split" onclick="document.getElementById('f-gallery').click()">📁 Gallery</button>
                        </div>
                        <div id="staging-gallery"></div>
                        <input type="file" id="f-camera" accept="image/*" capture="environment" style="display: none;" onchange="stageFiles(this)">
                        <input type="file" id="f-gallery" multiple accept="image/*" style="display: none;" onchange="stageFiles(this)">
                    </div>
                    <div class="split-row">
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label>Showroom Wall Color</label>
                            <input type="text" id="f-color" placeholder="Default: White">
                        </div>
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label id="logo-label-text">Logo Placement</label>
                            <select id="f-logo">
                                <option value="Bottom Left" selected>Bottom Left</option>
                                <option value="Bottom Right">Bottom Right</option>
                                <option value="Top Right">Top Right</option>
                                <option value="Top Left">Top Left</option>
                                <option value="Showroom Wall">Showroom Wall</option>
                                <option value="No Logo">No Logo</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" id="submit-btn" class="btn-main btn-gold">Initialize Staging</button>
                </form>
            </div>
        </section>
    </div>

    <script>
        let userData = { history: [] };
        let stagedFiles = [];
        const loginWebhook = 'https://hook.us2.make.com/ysngiu1djqh8wagjtn15rgzpwnwd9leu';

        window.onload = function() {
            const savedEmail = localStorage.getItem('pf_email');
            const savedPass = localStorage.getItem('pf_pass');
            if (savedEmail && savedPass) {
                document.getElementById('login-email').value = savedEmail;
                document.getElementById('login-password').value = savedPass;
                portalAuth();
            } else {
                document.getElementById('transition-overlay').style.display = 'none';
            }
        };

        async function portalAuth() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const error = document.getElementById('auth-error');
            const transitionOverlay = document.getElementById('transition-overlay');
            if(!email || !pass) return;

            transitionOverlay.style.display = 'flex';
            error.style.display = 'none';
            
            try {
                const res = await fetch(loginWebhook, {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: email, password: pass, page: 1 })
                });
                const data = await res.json();
                if (data.success) {
                    userData = data;
                    localStorage.setItem('pf_email', email);
                    localStorage.setItem('pf_pass', pass);
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-header').style.display = 'flex';
                    document.getElementById('app-container').style.display = 'block';
                    refreshUI();
                    transitionOverlay.style.opacity = '0';
                    setTimeout(() => { transitionOverlay.style.display = 'none'; }, 800);
                } else {
                    transitionOverlay.style.display = 'none';
                    error.innerText = "INVALID CREDENTIALS.";
                    error.style.display = 'block';
                }
            } catch (err) {
                transitionOverlay.style.display = 'none';
                error.innerText = "CONNECTION ERROR.";
                error.style.display = 'block';
            }
        }

        function signOut() {
            localStorage.removeItem('pf_email');
            localStorage.removeItem('pf_pass');
            window.location.reload(); 
        }

        function refreshUI() {
            document.getElementById('header-email').innerText = (userData.email || 'Authorized').toUpperCase();
            document.getElementById('header-credits').innerText = Math.round(userData.credits || 0) + ' CREDITS';
            document.getElementById('profile-tier').innerText = (userData.tier || '---').toUpperCase();
            const actualImg = document.getElementById('actual-logo-img');
            const noLogoText = document.getElementById('no-logo-text');
            const logoSelect = document.getElementById('f-logo');
            const logoLabel = document.getElementById('logo-label-text');

            if(userData.logo && userData.logo !== "" && userData.logo !== "undefined") {
                actualImg.src = userData.logo;
                actualImg.style.display = 'block';
                noLogoText.style.display = 'none';
                logoSelect.disabled = false;
                logoLabel.innerHTML = 'Logo Placement';
            } else {
                logoSelect.value = 'No Logo';
                logoSelect.disabled = true;
                logoLabel.innerHTML = 'Logo Placement <span style="color: #ff4d4d; font-size: 8px;">*SET IN PROFILE</span>';
            }

            const list = document.getElementById('submissions-list');
            const validHistory = (userData.history || []).filter(item => item && (item.vehicle || item.name || item.vehicleName));
            if(validHistory.length > 0) {
                list.innerHTML = validHistory.map(item => {
                    const thumb = item.thumbnail || '';
                    return `
                    <div class="card" style="padding:20px; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <div style="display:flex; align-items:center; gap:15px;">
                            ${thumb ? `<img src="${thumb}" style="width:45px; height:45px; object-fit:cover; border-radius:8px; border:1px solid #222;">` : `<div style="width:45px; height:45px; background:#000; border:1px solid #222; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; color:#333;">PF</div>`}
                            <div><p style="margin:0; font-weight:800; font-size:15px; color:#fff;">${item.vehicle || item.name || item.vehicleName || 'Listing'}</p><span style="font-size:10px; color:#555; font-weight:700;">${item.date || 'Active'}</span></div>
                        </div>
                        <span style="font-size:11px; color:var(--accent-gold); font-weight:900;">${(item.status || 'Received').toUpperCase()}</span>
                    </div>`;
                }).join('');
            } else {
                list.innerHTML = `<div class="card" style="text-align:center; padding: 50px 20px;"><p style="color: #444; font-size: 11px; text-transform: uppercase; font-weight:800;">No Listings Found</p></div>`;
            }
        }

        function showTab(t) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            const tabBtn = document.getElementById('tab-' + t);
            if(tabBtn) tabBtn.classList.add('active');
            window.scrollTo(0,0);
        }

        function openSubmit() {
            if(userData.credits <= 0) { alert("INSUFFICIENT CREDITS."); return; }
            showTab('submit');
        }

        function stageFiles(input) {
            const incoming = Array.from(input.files);
            incoming.forEach(f => { if (stagedFiles.length < 10) stagedFiles.push(f); });
            renderGallery();
        }

        function renderGallery() {
            const cont = document.getElementById('staging-gallery');
            cont.innerHTML = '';
            stagedFiles.forEach((f, i) => {
                const url = URL.createObjectURL(f);
                cont.innerHTML += `<div class="thumb-wrapper"><img src="${url}"><button type="button" class="remove-thumb" onclick="removePhoto(${i})">✕</button></div>`;
            });
        }

        function removePhoto(i) { stagedFiles.splice(i, 1); renderGallery(); }

        document.getElementById('inventory-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.classList.add('btn-loading');
            const formData = new FormData();
            formData.append('accountId', userData.accountId || userData.accountID);
            formData.append('vehicleName', document.getElementById('f-name').value.trim());
            formData.append('assetSource', document.getElementById('f-source').value.trim());
            formData.append('showroomColor', document.getElementById('f-color').value || "White");
            formData.append('logoPlacement', document.getElementById('f-logo').value);
            stagedFiles.forEach(f => formData.append('uploadAssets', f));
            try {
                await fetch('https://hook.us2.make.com/ffvrlwmhkukr66bmik4obd0c1ymi2sso', { method: 'POST', body: formData });
                document.getElementById('inventory-form').reset();
                stagedFiles = []; renderGallery();
                btn.classList.remove('btn-loading');
                showTab('dashboard');
                refreshUI();
            } catch (err) { btn.classList.remove('btn-loading'); }
        });

        function handleLogoSelect(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const actualImg = document.getElementById('actual-logo-img');
                    actualImg.src = e.target.result;
                    actualImg.style.display = 'block';
                    document.getElementById('no-logo-text').style.display = 'none';
                    document.getElementById('save-logo-btn').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function uploadNewLogo() {
            const file = document.getElementById('field-logoUpload').files[0];
            const btn = document.getElementById('save-logo-btn');
            const formData = new FormData();
            formData.append('logoFile', file);
            formData.append('accountId', userData.accountId || userData.accountID);
            btn.classList.add('btn-loading');
            try {
                const res = await fetch('https://hook.us2.make.com/axjf83eeowlrxkqpho7f3mhn4r9xqo5h', { method: 'POST', body: formData });
                if (res.ok) {
                    userData.logo = URL.createObjectURL(file);
                    refreshUI(); btn.classList.remove('btn-loading');
                    setTimeout(() => { btn.style.display = 'none'; }, 2000);
                }
            } catch (err) { btn.classList.remove('btn-loading'); }
        }

        function toggleContact(event) {
            event.stopPropagation();
            document.getElementById("contactBubble").classList.toggle("show");
        }

        function copyEmail() {
            navigator.clipboard.writeText("info@premiereflow.com");
            const btn = document.querySelector(".copy-btn");
            btn.innerText = "DONE";
            setTimeout(() => { btn.innerText = "COPY"; }, 2000);
        }

        window.onclick = function(event) {
            const bubble = document.getElementById("contactBubble");
            if (bubble && bubble.classList.contains('show') && !bubble.contains(event.target)) {
                bubble.classList.remove('show');
            }
        }
    </script>
</body>
</html>
