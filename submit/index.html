<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Inventory | Premiere Flow</title>
    <style>
        :root {
            --primary-black: #0a0a0a;
            --accent-gold: #c5a059; /* Optional accent or stick to white/grey for minimalist */
            --bg-dark: #000000;
            --text-white: #ffffff;
            --input-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .submit-container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
        }

        .logo-header img {
            width: 180px;
            margin-bottom: 40px;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #888;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            background: var(--input-bg);
            border: 1px solid #333;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: white;
            color: black;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ccc;
        }

        #error-message {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        #submission-portal {
            display: none; /* Hidden until ID is validated */
        }

        .hidden-tier-field {
            display: none;
        }
    </style>
</head>
<body>

<div class="submit-container">
    <div class="logo-header">
        <img src="https://premiereflow.com/img/logo.png" alt="Premiere Flow">
    </div>

    <div id="validation-stage">
        <h2>Unlock Portal</h2>
        <div class="form-group">
            <label for="account-id">Account ID</label>
            <input type="text" id="account-id" placeholder="PF-XXXX-XXXX" required>
        </div>
        <button onclick="validateID()">Unlock Submission Portal</button>
        <p id="error-message"></p>
    </div>

    <div id="submission-portal">
        <h2 id="status-heading">Access Granted</h2>
        <p id="credits-remaining" style="color: #888; margin-bottom: 30px;"></p>

        <form id="inventory-form" action="https://hook.us2.make.com/ffvrlwmhkukr66bmik4obd0c1ymi2sso" method="POST">
            <input type="hidden" id="hidden-id" name="accountID">
            
            <div class="form-group">
                <label>Inventory / Listing Link</label>
                <input type="url" name="listingUrl" placeholder="https://www.dealership.com/car" required>
            </div>

            <div class="form-group">
                <label>Photo Folder (Dropbox/Drive)</label>
                <input type="url" name="photoFolder" placeholder="Link to raw assets" required>
            </div>

            <div id="branding-fields" class="hidden-tier-field">
                <div class="form-group">
                    <label>Logo Files (for Watermarks)</label>
                    <input type="url" name="logoFiles" placeholder="Link to PNG/SVG logos">
                </div>
                <div class="form-group">
                    <label>Branding Notes</label>
                    <textarea name="brandingNotes" rows="3" placeholder="Specific overlay instructions..."></textarea>
                </div>
            </div>

            <button type="submit">Submit for Production</button>
        </form>
    </div>
</div>

<script>
    async function validateID() {
        const id = document.getElementById('account-id').value;
        const errorMsg = document.getElementById('error-message');
        const webhookUrl = 'https://hook.us2.make.com/3fo42xcb1acfxniws2bblqoid56go4r1'; // Separate Webhook to check Google Sheet

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ accountID: id })
            });
            
            const data = await response.json();

            if (data.status === 'success') {
                document.getElementById('validation-stage').style.display = 'none';
                document.getElementById('submission-portal').style.display = 'block';
                document.getElementById('hidden-id').value = id;
                document.getElementById('credits-remaining').innerText = `Credits Remaining: ${data.credits}`;
                
                // Tier Check
                if (data.tier !== 'Upgrade') {
                    document.getElementById('branding-fields').style.display = 'block';
                }
            } else {
                errorMsg.innerText = data.message;
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            errorMsg.innerText = "Connection error. Please try again.";
            errorMsg.style.display = 'block';
        }
    }
</script>

</body>
</html>
