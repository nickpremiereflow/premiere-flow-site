<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premiere Flow | Portal</title>
    
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --primary-black: #000000;
            --accent-gold: #c5a059;
            --bg-dark: #000000;
            --card-bg: #0a0a0a;
            --text-white: #ffffff;
            --text-dim: #666;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- PERSISTENT HEADER --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .header-left img { height: 25px; }
        .header-right { text-align: right; }
        .user-email { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .user-credits { font-size: 11px; color: var(--accent-gold); font-weight: 800; display: block; margin-top: 2px; }

        /* --- APP CONTAINER --- */
        #app-container {
            margin-top: 70px;
            margin-bottom: 80px; /* Space for mobile nav */
            padding: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- MOBILE BOTTOM NAV --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: #050505;
            border-top: 1px solid #111;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
        }

        .nav-item.active { color: #fff; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        /* --- CARDS & UI ELEMENTS --- */
        .view-section { display: none; }
        .view-section.active { display: block; }

        .card {
            background: var(--card-bg);
            border: 1px solid #111;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: var(--transition);
        }

        .status-badge {
            font-size: 9px;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #111;
            color: #888;
        }
        .status-ready { background: #1a2e1a; color: #4ade80; }
        .status-staging { background: #2e261a; color: #fbbf24; }

        .btn-action {
            padding: 10px 15px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            margin-right: 10px;
        }
        .btn-download { background: #fff; color: #000; }
        .btn-revise { background: transparent; border: 1px solid #333; color: #fff; }

        /* --- NEW SUBMISSION MODAL / BUTTON --- */
        .fab-container { text-align: center; margin: 30px 0; }
        .btn-new {
            background: var(--accent-gold);
            color: #000;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
        }

        /* --- LOGO UPLOAD AREA --- */
        .logo-preview-box {
            width: 100px;
            height: 100px;
            border: 1px dashed #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* --- HIDE ELEMENTS --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center;
        }

        @media (min-width: 800px) {
            .bottom-nav { top: 0; bottom: auto; left: 50%; transform: translateX(-50%); width: auto; background: none; border: none; height: 70px; }
            .nav-item { margin: 0 20px; }
            header { padding: 0 10%; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="width: 100%; max-width: 350px; padding: 20px; text-align: center;">
            <img src="https://premiereflow.com/logo.png" style="width: 150px; margin-bottom: 40px;">
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 2px;">Account ID</label>
                <input type="text" id="login-id" placeholder="PF-XXXX-XXXX" style="width: 100%; padding: 15px; background: #0a0a0a; border: 1px solid #111; color: #fff; border-radius: 4px; margin-top: 10px;">
            </div>
            <button onclick="portalAuth()" style="width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: 900; text-transform: uppercase; border-radius: 4px; cursor: pointer;">Unlock Portal</button>
            <p id="auth-error" style="color: #ff4d4d; font-size: 11px; margin-top: 20px; display: none;"></p>
        </div>
    </div>

    <header id="main-header" style="display: none;">
        <div class="header-left">
            <img src="https://premiereflow.com/logo.png" alt="PF">
        </div>
        <div class="header-right">
            <span class="user-email" id="header-email">---</span>
            <span class="user-credits" id="header-credits">0 Credits</span>
        </div>
    </header>

    <div id="app-container" style="display: none;">
        
        <section id="view-dashboard" class="view-section active">
            <div class="fab-container">
                <button class="btn-new" id="main-action-btn" onclick="openSubmit()">New Submission</button>
            </div>
            <h3 style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #444; margin-bottom: 20px;">Active Productions</h3>
            <div id="submissions-list">
                <div class="card" style="text-align:center; border: 1px dashed #222;">
                    <p style="color: #333; font-size: 11px;">No active listings. Capture your first vehicle to begin.</p>
                </div>
            </div>
        </section>

        <section id="view-profile" class="view-section">
            <div class="card">
                <h3 style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-top: 0;">Brand Identity</h3>
                <label style="font-size: 9px; color: #555; text-transform: uppercase;">Constant Brand Logo</label>
                <div id="logo-preview" class="logo-preview-box">
                    <span id="no-logo-text" style="font-size: 10px; color: #333;">No Logo Set</span>
                </div>
                <button style="font-size: 10px; background: #111; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">Update Logo</button>
            </div>
            <div class="card">
                <h3 style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-top: 0;">Account Details</h3>
                <p id="profile-tier" style="font-size: 11px; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 5px;"></p>
                <p id="profile-joined" style="font-size: 11px; color: #666;"></p>
            </div>
        </section>

        <section id="view-notifications" class="view-section">
            <h3 style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #444; margin-bottom: 20px;">Recent Alerts</h3>
            <div id="notif-list">
                <div class="card" style="border-left: 3px solid var(--accent-gold);">
                    <p style="font-size: 12px; margin: 0;"><b>System:</b> Your account is active. Ready for production.</p>
                    <span style="font-size: 9px; color: #444;">Just now</span>
                </div>
            </div>
        </section>

        <section id="view-submit" class="view-section">
            <button onclick="showTab('dashboard')" style="background:none; border:none; color:#555; font-size:10px; text-transform:uppercase; margin-bottom:20px; cursor:pointer;">← Back to Dashboard</button>
            <div class="card">
                <form id="inventory-form">
                    <div class="form-group">
                        <label>Vehicle Name</label>
                        <input type="text" id="f-name" required placeholder="2024 Kia K4">
                    </div>
                    <div class="form-group">
                        <label>Asset Source (Link or Folder)</label>
                        <input type="text" id="f-source" placeholder="Paste listing URL...">
                    </div>
                    <div style="text-align:center; margin: 15px 0; font-size: 9px; color: #222;">OR</div>
                    <div class="form-group">
                        <label>Camera Capture</label>
                        <input type="file" id="f-files" multiple accept="image/*" capture="environment">
                    </div>
                    <div class="form-group">
                        <label>Showroom / Background Notes</label>
                        <textarea id="f-notes" rows="3" placeholder="Elite styling notes..."></textarea>
                    </div>
                    <button type="submit" id="submit-btn" style="background: #fff; color: #000; font-weight: 900; width: 100%; padding: 18px; border: none; text-transform: uppercase; letter-spacing: 2px;">Start Production</button>
                </form>
            </div>
        </section>

    </div>

    <nav class="bottom-nav" id="bottom-nav" style="display: none;">
        <div class="nav-item active" onclick="showTab('dashboard')" id="nav-dashboard">
            <span class="nav-icon">▤</span>
            <span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="showTab('notifications')" id="nav-notifications">
            <span class="nav-icon">◈</span>
            <span>Alerts</span>
        </div>
        <div class="nav-item" onclick="showTab('profile')" id="nav-profile">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </div>
    </nav>

    <script>
        let userData = {};

        // AUTHENTICATION
        async function portalAuth() {
            const id = document.getElementById('login-id').value;
            const res = await fetch('https://hook.us2.make.com/3fo42xcb1acfxniws2bblqoid56go4r1', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ accountID: id })
            });
            const data = await res.json();
            
            if (data.status === 'success') {
                userData = data;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-header').style.display = 'flex';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('bottom-nav').style.display = 'flex';
                
                updateUI();
                fetchSubmissions();
            } else {
                document.getElementById('auth-error').innerText = "Invalid ID. Check your welcome email.";
                document.getElementById('auth-error').style.display = 'block';
            }
        }

        // TAB SWITCHING
        function showTab(tabId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('view-' + tabId).classList.add('active');
            if(tabId !== 'submit') document.getElementById('nav-' + tabId).classList.add('active');
            window.scrollTo(0,0);
        }

        function openSubmit() {
            if(userData.credits <= 0) {
                alert("Please add credits to continue.");
                return;
            }
            showTab('submit');
        }

        // UI UPDATES
        function updateUI() {
            document.getElementById('header-email').innerText = userData.email || 'Authorized Dealer';
            document.getElementById('header-credits').innerText = Math.round(userData.credits) + ' Credits';
            document.getElementById('profile-tier').innerText = userData.tier + ' Tier';
            document.getElementById('profile-joined').innerText = 'Member Since: ' + (userData.dateJoined || '2026');
            
            if(userData.logo) {
                document.getElementById('logo-preview').style.backgroundImage = `url('${userData.logo}')`;
                document.getElementById('no-logo-text').style.display = 'none';
            }
            
            // Action Button Logic
            const actionBtn = document.getElementById('main-action-btn');
            if(userData.credits <= 0) {
                actionBtn.innerText = "Add Credits";
                actionBtn.style.background = "#333";
                actionBtn.style.color = "#888";
            }
        }

        // FETCH SUBMISSIONS (SCENARIO C - To be built)
        async function fetchSubmissions() {
            const list = document.getElementById('submissions-list');
            // This would be another webhook to get user's rows from Sheets
        }

        // SUBMISSION HANDLER
        document.getElementById('inventory-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "INITIALIZING PRODUCTION..."; btn.disabled = true;

            const payload = {
                accountID: userData.accountID,
                vehicleName: document.getElementById('f-name').value,
                assetSource: document.getElementById('f-source').value,
                showroomNotes: document.getElementById('f-notes').value
            };

            await fetch('https://hook.us2.make.com/ffvrlwmhkukr66bmik4obd0c1ymi2sso', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            showTab('dashboard');
            // Trigger local notification
            const notif = document.getElementById('notif-list');
            notif.innerHTML = `<div class="card" style="border-left: 3px solid #fbbf24;">
                <p style="font-size:12px; margin:0;"><b>Production Started:</b> ${payload.vehicleName} is being staged.</p>
                <span style="font-size:9px; color:#444;">Just now</span>
            </div>` + notif.innerHTML;
        });
    </script>
</body>
</html>
