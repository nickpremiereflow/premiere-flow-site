<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Setup | Premiere Flow</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* PASSWORD METER STYLES */
        .pwd-meter-container { width: 100%; height: 4px; background: #1a1a1a; border-radius: 2px; margin-top: 15px; overflow: hidden; }
        .pwd-meter-fill { height: 100%; width: 0%; background: #ff4d4d; transition: width 0.3s ease, background-color 0.3s ease; }
        .pwd-criteria { font-size: 9px; color: #666; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; }
        .crit-item { transition: color 0.3s; }
        .crit-pass { color: #c5a059; font-weight: 900; }
        .crit-fail { color: #555; }
        
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Spinner for the button when processing */
        .spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid #000;
            border-top: 2px solid #c5a059;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="login-body">
    <div class="setup-container" style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #000;">
        <div class="login-card" style="background: #111; padding: 40px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 400px; text-align: center;">
            <img src="https://premiereflow.com/logo.png" style="width: 140px; margin-bottom: 30px;">
            <h2 style="color: #fff; margin-bottom: 10px; font-family: sans-serif; letter-spacing: -1px;">Set Your Password</h2>
            <p style="color: #888; font-size: 13px; margin-bottom: 25px; font-family: sans-serif;">Secure your studio access below.</p>
            
            <input type="password" id="pass1" placeholder="Enter Password" onkeyup="checkPasswordStrength(this.value)" style="width: 100%; padding: 12px; margin: 10px 0 0 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box;">
            
            <div class="pwd-meter-container">
                <div class="pwd-meter-fill" id="pwd-fill"></div>
            </div>
            <div class="pwd-criteria" style="margin-bottom: 15px;">
                <span class="crit-item crit-fail" id="crit-len">8+ Chars</span>
                <span class="crit-item crit-fail" id="crit-up">1 Upper</span>
                <span class="crit-item crit-fail" id="crit-num">1 Num/Sym</span>
            </div>

            <input type="password" id="pass2" placeholder="Confirm Password" style="width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box;">
            
            <button class="btn-main" id="submit-btn" onclick="submitSetup()" style="display: flex; align-items: center; justify-content: center; width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 15px; font-family: sans-serif;">
                <span>FINISH SETUP</span>
                <div id="btn-spinner" class="spinner"></div>
            </button>
            
            <p id="msg" style="margin-top: 20px; font-size: 11px; font-weight: 700; color: #fff; font-family: sans-serif; text-transform: uppercase; letter-spacing: 1px;"></p>
        </div>
    </div>

    <script>
        let isPassStrong = false;

        function checkPasswordStrength(val) {
            const lenPass = val.length >= 8;
            const upPass = /[A-Z]/.test(val);
            const numSymPass = /[0-9!@#$%^&*(),.?":{}|<>]/.test(val);

            document.getElementById('crit-len').className = `crit-item ${lenPass ? 'crit-pass' : 'crit-fail'}`;
            document.getElementById('crit-up').className = `crit-item ${upPass ? 'crit-pass' : 'crit-fail'}`;
            document.getElementById('crit-num').className = `crit-item ${numSymPass ? 'crit-pass' : 'crit-fail'}`;

            let score = 0;
            if(lenPass) score++;
            if(upPass) score++;
            if(numSymPass) score++;

            isPassStrong = (score === 3);
            const fill = document.getElementById('pwd-fill');
            
            fill.style.width = (score / 3 * 100) + '%';
            if (score === 0) fill.style.width = '0%';
            else if (score === 1) fill.style.backgroundColor = '#ff4d4d'; 
            else if (score === 2) fill.style.backgroundColor = '#ffa64d'; 
            else if (score === 3) fill.style.backgroundColor = '#c5a059'; 
        }

        async function submitSetup() {
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('submit-btn');
            const spinner = document.getElementById('btn-spinner');
            const token = new URLSearchParams(window.location.search).get('token');

            if (!token) { 
                msg.style.color = "#ff4d4d";
                msg.innerText = "ERROR: INVALID OR MISSING TOKEN"; 
                return; 
            }
            if (!isPassStrong) { 
                msg.style.color = "#ff4d4d";
                msg.innerText = "PLEASE MEET ALL PASSWORD REQUIREMENTS"; 
                return; 
            }
            if (p1 !== p2) { 
                msg.style.color = "#ff4d4d";
                msg.innerText = "PASSWORDS DO NOT MATCH"; 
                return; 
            }

            msg.style.color = "#888";
            msg.innerText = "SECURING ACCOUNT";
            btn.disabled = true;
            spinner.style.display = "inline-block";
            
            try {
                const response = await fetch('https://hook.us2.make.com/1jhtjhiti621wbs45rfz6pqchyhx81u0', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: token, 
                        password: p1 
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.email) {
                        localStorage.setItem('pf_email', data.email);
                        localStorage.setItem('pf_pass', p1);
                    }

                    msg.innerHTML = "<span style='color: #c5a059;'>SUCCESS UNLOCKING STUDIO</span>";
                    
                    setTimeout(() => {
                        window.location.href = "../submit/";
                    }, 2000);
                } else {
                    btn.disabled = false;
                    spinner.style.display = "none";
                    msg.style.color = "#ff4d4d";
                    msg.innerText = "ERROR: LINK EXPIRED OR INVALID";
                }
            } catch (err) { 
                btn.disabled = false;
                spinner.style.display = "none";
                msg.style.color = "#ff4d4d";
                msg.innerText = "CONNECTION ERROR PLEASE TRY AGAIN"; 
            }
        }
    </script>
</body>
</html>
