<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Your Studio | Premiere Flow</title>
    
    <link rel="icon" type="image/png" href="../premiereflowfavicon.png">
    <link rel="stylesheet" href="../style.css">
    
    <style>
        /* PAGE ARCHITECTURE */
        body.login-body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Inter', sans-serif;
        }

        .login-card { 
            background: #0a0a0a; 
            padding: 50px 40px; 
            border-radius: 24px; 
            border: 1px solid #111; 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.6);
        }

        h2 { 
            color: #fff; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            font-weight: 900; 
            letter-spacing: -0.5px; 
            font-size: 22px;
        }

        .sub-text { color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 35px; display: block; }

        /* INPUTS */
        input[type="password"] { 
            width: 100%; 
            padding: 20px; 
            margin: 10px 0; 
            background: #000; 
            border: 1px solid #1a1a1a; 
            color: #fff; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent-gold); outline: none; }
        ::placeholder { color: #ffffff; opacity: 0.2; transition: opacity 0.3s; }

        /* PASSWORD METER */
        .pwd-meter-container { width: 100%; height: 3px; background: #111; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .pwd-meter-fill { height: 100%; width: 0%; background: #ff4d4d; transition: width 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), background-color 0.4s ease; }
        
        .pwd-criteria { font-size: 9px; color: #333; margin-top: 12px; text-transform: uppercase; letter-spacing: 1.5px; display: flex; justify-content: space-between; font-weight: 800; }
        .crit-pass { color: var(--accent-gold); }

        /* BUTTON */
        .btn-main { 
            width: 100%; 
            padding: 22px; 
            background: #fff; 
            color: #000; 
            border: none; 
            border-radius: 50px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            cursor: pointer; 
            margin-top: 30px; 
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .btn-main:hover:not(:disabled) { background: var(--accent-gold); transform: translateY(-2px); }
        .btn-main:disabled { opacity: 0.2; cursor: not-allowed; }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #000;
            border-top: 2px solid var(--accent-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #msg { margin-top: 25px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; height: 14px; }
    </style>
</head>
<body class="login-body">

    <div class="login-card">
        <img src="../logo.png" style="width: 160px; margin-bottom: 40px; filter: brightness(1);">
        
        <h2>Set Password</h2>
        <span class="sub-text">Initialize Studio Credentials</span>
        
        <input type="password" id="pass1" placeholder="New Password" oninput="validateForm()">
        
        <div class="pwd-meter-container">
            <div class="pwd-meter-fill" id="pwd-fill"></div>
        </div>
        
        <div class="pwd-criteria">
            <span class="crit-item" id="crit-len">8+ Chars</span>
            <span class="crit-item" id="crit-up">1 Upper</span>
            <span class="crit-item" id="crit-num">1 Number</span>
        </div>

        <input type="password" id="pass2" placeholder="Confirm Password" oninput="validateForm()">
        
        <button class="btn-main" id="submit-btn" disabled onclick="submitSetup()">
            <span>Finish Setup</span>
            <div id="btn-spinner" class="spinner"></div>
        </button>
        
        <p id="msg"></p>
    </div>

    <script>
        let isPassStrong = false;

        function validateForm() {
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const btn = document.getElementById('submit-btn');

            const lenPass = p1.length >= 8;
            const upPass = /[A-Z]/.test(p1);
            const numSymPass = /[0-9!@#$%^&*()]/.test(p1);

            document.getElementById('crit-len').className = `crit-item ${lenPass ? 'crit-pass' : ''}`;
            document.getElementById('crit-up').className = `crit-item ${upPass ? 'crit-pass' : ''}`;
            document.getElementById('crit-num').className = `crit-item ${numSymPass ? 'crit-pass' : ''}`;

            let score = 0;
            if(lenPass) score++;
            if(upPass) score++;
            if(numSymPass) score++;

            isPassStrong = (score === 3);
            const fill = document.getElementById('pwd-fill');
            
            fill.style.width = (score / 3 * 100) + '%';
            if (score === 1) fill.style.backgroundColor = '#ff4d4d'; 
            else if (score === 2) fill.style.backgroundColor = '#ffa64d'; 
            else if (score === 3) fill.style.backgroundColor = '#c5a059'; 

            if (isPassStrong && p1 === p2 && p1 !== "") {
                btn.disabled = false;
            } else {
                btn.disabled = true;
            }
        }

        async function submitSetup() {
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('submit-btn');
            const spinner = document.getElementById('btn-spinner');
            const token = new URLSearchParams(window.location.search).get('token');

            if (!token) { 
                msg.style.color = "#ff4d4d";
                msg.innerText = "Error: Invalid or Missing Token"; 
                return; 
            }

            msg.style.color = "#555";
            msg.innerText = "Securing Studio Assets...";
            btn.disabled = true;
            spinner.style.display = "inline-block";
            
            try {
                const response = await fetch('https://hook.us2.make.com/1jhtjhiti621wbs45rfz6pqchyhx81u0', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: token, 
                        password: p1,
                        confirmPassword: p2 
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Auto-cache credentials if Make returns the email
                    if (data.email) {
                        localStorage.setItem('pf_email', data.email);
                        localStorage.setItem('pf_pass', p1);
                    }

                    msg.style.color = "#c5a059";
                    msg.innerText = "Success. Studio Unlocked.";
                    
                    setTimeout(() => {
                        window.location.href = "/login/";
                    }, 2000);
                } else {
                    btn.disabled = false;
                    spinner.style.display = "none";
                    msg.style.color = "#ff4d4d";
                    msg.innerText = "Error: Link Expired or Invalid";
                }
            } catch (err) { 
                btn.disabled = false;
                spinner.style.display = "none";
                msg.style.color = "#ff4d4d";
                msg.innerText = "Connection Error. Try Again."; 
            }
        }
    </script>
</body>
</html>
