<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Setup | Premiere Flow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body"> <div class="setup-container" style="display: flex; align-items: center; justify-content: center; height: 100vh;">
        <div class="login-card" style="background: #111; padding: 40px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 400px; text-align: center;">
            <img src="https://premiereflow.com/logo.png" style="width: 140px; margin-bottom: 30px;">
            <h2 style="color: #fff; margin-bottom: 10px;">Set Your Password</h2>
            <p style="color: #888; font-size: 13px; margin-bottom: 25px;">Secure your studio access below.</p>
            
            <input type="password" id="pass1" placeholder="New Password" style="width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px;">
            <input type="password" id="pass2" placeholder="Confirm Password" style="width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px;">
            
            <button class="btn-main" onclick="submitSetup()" style="width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 15px;">Finish Setup</button>
            
            <p id="msg" style="margin-top: 20px; font-size: 14px; color: #fff;"></p>
        </div>
    </div>

    <script>
        async function submitSetup() {
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const msg = document.getElementById('msg');
            const token = new URLSearchParams(window.location.search).get('token');

            if (!token) { msg.innerText = "Error: Invalid or missing token."; return; }
            if (p1 !== p2) { msg.innerText = "Passwords do not match."; return; }
            if (p1.length < 6) { msg.innerText = "Password must be at least 6 characters."; return; }

            msg.innerText = "Securing account...";
            
            try {
                const response = await fetch('https://hook.us2.make.com/YOUR_NEW_SET_PASSWORD_WEBHOOK', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, password: p1 })
                });

                if (response.ok) {
                    msg.innerHTML = "Success! <a href='/' style='color:#fff; text-decoration: underline;'>Login here</a>";
                } else {
                    msg.innerText = "Error: Link expired or invalid.";
                }
            } catch (err) { msg.innerText = "Connection error."; }
        }
    </script>
</body>
</html>
