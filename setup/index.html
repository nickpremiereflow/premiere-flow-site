<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Setup | Premiere Flow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="setup-container" style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #000;">
        <div class="login-card" style="background: #111; padding: 40px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 400px; text-align: center;">
            <img src="https://premiereflow.com/logo.png" style="width: 140px; margin-bottom: 30px;">
            <h2 style="color: #fff; margin-bottom: 10px; font-family: sans-serif;">Set Your Password</h2>
            <p style="color: #888; font-size: 13px; margin-bottom: 25px; font-family: sans-serif;">Secure your studio access below.</p>
            
            <input type="password" id="pass1" placeholder="New Password" style="width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box;">
            <input type="password" id="pass2" placeholder="Confirm Password" style="width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box;">
            
            <button class="btn-main" onclick="submitSetup()" style="width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 15px; font-family: sans-serif;">Finish Setup</button>
            
            <p id="msg" style="margin-top: 20px; font-size: 14px; color: #fff; font-family: sans-serif;"></p>
        </div>
    </div>

    <script>
        async function submitSetup() {
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const msg = document.getElementById('msg');
            const token = new URLSearchParams(window.location.search).get('token');

            if (!token) { 
                msg.style.color = "#ff4d4d";
                msg.innerText = "Error: Invalid or missing token."; 
                return; 
            }
            if (p1 !== p2) { 
                msg.style.color = "#ff4d4d";
                msg.innerText = "Passwords do not match."; 
                return; 
            }
            if (p1.length < 6) { 
                msg.style.color = "#ff4d4d";
                msg.innerText = "Password must be at least 6 characters."; 
                return; 
            }

            msg.style.color = "#fff";
            msg.innerText = "Securing account...";
            
            try {
                const response = await fetch('https://hook.us2.make.com/8pvhkw9cjs4bf1ruvo0ftr3xapf020u4', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: token, 
                        password: p1 
                    })
                });

                if (response.ok) {
                    msg.innerHTML = "<span style='color: #4bb543;'>Success! Redirecting to login...</span>";
                    setTimeout(() => {
                        window.location.href = "https://premiereflow.com";
                    }, 3000);
                } else {
                    msg.style.color = "#ff4d4d";
                    msg.innerText = "Error: Link expired or invalid.";
                }
            } catch (err) { 
                msg.style.color = "#ff4d4d";
                msg.innerText = "Connection error. Please try again."; 
            }
        }
    </script>
</body>
</html>
