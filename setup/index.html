<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Setup | Premiere Flow</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            text-align: center; 
            background: #000; 
            color: #fff; 
            padding: 20px; 
            font-family: sans-serif; 
            margin: 0; 
        }
        .container { 
            background: #080808; 
            border: 1px solid #1a1a1a; 
            padding: 40px; 
            border-radius: 24px; 
            max-width: 450px; 
            width: 100%; 
            box-sizing: border-box; 
        }
        input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 15px; 
            background: #111; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #007bff;
        }
        button { 
            width: 100%; 
            padding: 16px; 
            background: #fff; 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-top: 10px;
        }
        button:disabled { 
            background: #444; 
            color: #888; 
            cursor: not-allowed; 
        }
        .msg { 
            margin-top: 20px; 
            font-size: 0.85rem; 
            font-weight: 800; 
            min-height: 20px; 
            letter-spacing: 1px;
        }
        h1 { 
            font-size: 2.5rem; 
            letter-spacing: -1px; 
            margin-top: 0; 
            margin-bottom: 10px; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SECURE <span style="color: #007bff;">SETUP.</span></h1>
        <p style="color: #aaa; margin-bottom: 30px; font-size: 0.9rem; line-height: 1.5;">Create your studio password to finalize your account and unlock your dashboard.</p>

        <input type="password" id="pass1" placeholder="Enter Password" required>
        <input type="password" id="pass2" placeholder="Confirm Password" required>

        <button id="setup-btn" onclick="submitSetup()">Finish Setup</button>
        <div id="status-msg" class="msg"></div>
    </div>

    <script>
        // Extract the token from the URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const btn = document.getElementById('setup-btn');
        const msg = document.getElementById('status-msg');

        // If no token is found on load, instantly disable the form to protect the endpoint
        window.onload = function() {
            if (!token) {
                btn.disabled = true;
                msg.style.color = "#ff4d4d";
                msg.innerText = "ERROR: INVALID OR MISSING SECURITY TOKEN.";
                document.getElementById('pass1').disabled = true;
                document.getElementById('pass2').disabled = true;
            }
        };

        async function submitSetup() {
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;

            // Basic validation
            if (p1.length < 6) {
                msg.style.color = "#ff4d4d";
                msg.innerText = "PASSWORD MUST BE AT LEAST 6 CHARACTERS.";
                return;
            }
            if (p1 !== p2) {
                msg.style.color = "#ff4d4d";
                msg.innerText = "PASSWORDS DO NOT MATCH.";
                return;
            }

            // Lock the UI and show loading state
            btn.disabled = true;
            btn.innerText = "SECURING ACCOUNT...";
            msg.innerText = "";

            try {
                // Send the token and new password to your Make.com logic engine
                const response = await fetch('https://hook.us2.make.com/1jhtjhiti621wbs45rfz6pqchyhx81u0', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: token, 
                        password: p1 
                    })
                });

                if (response.ok) {
                    // Catch the JSON response from Make.com
                    const data = await response.json(); 
                    
                    // AUTO-LOGIN: Save credentials to the browser if Make returned the email
                    if (data.email) {
                        localStorage.setItem('pf_email', data.email);
                        localStorage.setItem('pf_pass', p1);
                    }
                    
                    msg.innerHTML = "<span style='color: #007bff;'>SUCCESS! UNLOCKING STUDIO...</span>";
                    
                    // Redirect straight to Dashboard after a brief delay
                    setTimeout(() => {
                        window.location.href = "../submit/";
                    }, 2000);
                } else {
                    btn.disabled = false;
                    btn.innerText = "Finish Setup";
                    msg.style.color = "#ff4d4d";
                    msg.innerText = "ERROR: LINK EXPIRED OR INVALID.";
                }
            } catch (err) { 
                btn.disabled = false;
                btn.innerText = "Finish Setup";
                msg.style.color = "#ff4d4d";
                msg.innerText = "CONNECTION ERROR. PLEASE TRY AGAIN."; 
            }
        }
    </script>

</body>
</html>
