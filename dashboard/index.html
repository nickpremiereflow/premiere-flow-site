<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Dashboard | Premiere Flow</title>
    
    <link rel="icon" type="image/png" href="../premiereflowfavicon.png">
    <link rel="stylesheet" href="../style.css">
    
    <style>
        /* --- DASHBOARD SPECIFIC OVERRIDES & LAYOUT --- */
        #app-container { 
            margin-top: 140px; 
            margin-bottom: 60px; 
            padding: 0 20px; 
            max-width: 650px; 
            margin-left: auto; 
            margin-right: auto; 
            animation: fadeIn 0.6s ease-out; 
            min-height: 60vh; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .dash-menu { display: flex; justify-content: center; gap: 45px; margin-bottom: 45px; border-bottom: 1px solid #111; padding-bottom: 20px; }
        .tab-link { font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: #444; cursor: pointer; transition: 0.3s; }
        .tab-link.active { color: var(--accent-gold); }

        .view-section { display: none; }
        .view-section.active { display: block; }
        
        .card { background: var(--card-bg); border: 1px solid #111; border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 4px 25px rgba(0,0,0,0.4); }
        h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 2.5px; color: #666; margin-bottom: 25px; font-weight: 900; }
        
        .form-group { margin-bottom: 30px; text-align: left; }
        label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 12px; font-weight: 700; }
        
        input, textarea, select { width: 100%; padding: 20px; background: #000; border: 1px solid #1a1a1a; border-radius: 10px; color: #fff; box-sizing: border-box; font-size: 16px; font-family: inherit; }

        .btn-main { position: relative; overflow: hidden; width: 100%; padding: 22px; background: #fff; color: #000; border: none; border-radius: 50px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn-gold { background: var(--accent-gold); color: #000; }
        .btn-split { flex: 1; padding: 18px; background: #111; color: #fff; border: 1px solid #333; border-radius: 10px; cursor: pointer; font-size: 12px; text-transform: uppercase; font-weight: 800; }
        .split-row { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }

        /* LISTING CARDS */
        .listing-card { background: var(--card-bg); border: 1px solid #111; border-radius: 16px; overflow: hidden; margin-bottom: 25px; display: flex; flex-direction: column; }
        .listing-main-row { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; }
        .listing-info-left { display: flex; align-items: center; gap: 15px; flex: 1; text-align: left; }
        .listing-thumb { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; border: 1px solid #222; }
        .listing-title { margin: 0 0 4px 0; font-weight: 800; font-size: 15px; color: #fff; }
        .listing-date { font-size: 10px; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        .status-badge { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; padding: 6px 12px; border-radius: 4px; }
        .status-progress { color: #888; background: #111; border: 1px solid #222; }
        .status-completed { color: #000; background: var(--accent-gold); }

        .btn-download { padding: 10px 18px; border-radius: 6px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: none; transition: 0.3s; }
        .btn-download.active { background: var(--accent-gold); color: #000; }
        .btn-download.disabled { background: #111; color: #444; pointer-events: none; border: 1px solid #222; }

        .listing-accordion-row { display: flex; border-top: 1px solid #111; background: #050505;}
        .accordion-btn { flex: 1; padding: 15px; background: transparent; border: none; color: #888; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .accordion-btn:first-child { border-right: 1px solid #111; }

        .listing-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .gallery-item { aspect-ratio: 1/1; border-radius: 6px; overflow: hidden; border: 1px solid #222; background: #000; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        #staging-gallery { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 20px; }
        .thumb-wrapper { position: relative; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; border: 1px solid #222; background: #050505; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .remove-thumb { position: absolute; top: 4px; right: 4px; background: #ff4d4d; color: #fff; border: none; border-radius: 5px; width: 22px; height: 22px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .btn-loading { pointer-events: none; opacity: 0.5; position: relative; }
        .btn-loading::after { content: ''; position: absolute; bottom: 0; left: 0; height: 4px; width: 30%; background: #000; border-radius: 4px; animation: loadingBarSlide 1.5s infinite; }
        @keyframes loadingBarSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

        #transition-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 3000; display: flex; align-items: center; justify-content: center; transition: 0.8s; pointer-events: none; }
        .pulse-logo { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.4; transform: scale(0.98); } }

        @media (max-width: 768px) {
            .listing-main-row { flex-direction: column; align-items: flex-start; gap: 20px; }
            .listing-status-right { width: 100%; justify-content: space-between; }
            .split-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="transition-overlay">
        <img src="https://premiereflow.com/logo.png" class="pulse-logo" style="width: 180px; filter: brightness(0);">
    </div>

    <script src="/header.js"></script>

    <div id="app-container">
        <nav class="dash-menu">
            <span class="tab-link active" id="tab-dashboard" onclick="showTab('dashboard')">Listings</span>
            <span class="tab-link" id="tab-notifications" onclick="showTab('notifications')">Alerts</span>
            <span class="tab-link" id="tab-profile" onclick="showTab('profile')">Account</span>
            <span class="tab-link" id="tab-support" onclick="showTab('support')">Support</span>
        </nav>

        <section id="view-dashboard" class="view-section active">
            <div style="margin-bottom: 40px;">
                <button class="btn-main btn-gold" onclick="showTab('submit')">New Listing</button>
            </div>
            <h3>Active Listings</h3>
            <div id="submissions-list"></div>
        </section>

        <section id="view-notifications" class="view-section">
            <h3>Recent activity</h3>
            <div class="card" style="border-left: 4px solid var(--accent-gold);">
                <p style="font-size: 14px; margin: 0; line-height: 1.6; text-align: left;"><b>System:</b> Dashboard operational. Ready for staging.</p>
                <span style="font-size: 10px; color: #555; display: block; margin-top: 12px; font-weight: 800; text-align: left;">Just Now</span>
            </div>
        </section>

        <section id="view-profile" class="view-section">
            <div class="card">
                <h3>Account Logo</h3>
                <div id="logo-preview" style="width: 140px; height: 140px; border: 1px dashed #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 15px auto; background-color: #050505; overflow: hidden; padding: 15px;">
                    <span id="no-logo-text" style="font-size: 10px; color: #333; font-weight: 900; text-transform: uppercase;">No Logo Set</span>
                    <img id="actual-logo-img" src="" style="display: none; max-width: 100%; max-height: 100%; object-fit: contain;">
                </div>
                <input type="file" id="field-logoUpload" accept="image/*" style="display: none;" onchange="handleLogoSelect(this)">
                <div style="display: flex; gap: 15px;">
                    <button onclick="document.getElementById('field-logoUpload').click()" class="btn-split">Upload Logo</button>
                    <button id="save-logo-btn" onclick="uploadNewLogo()" style="display: none;" class="btn-split">Save to Profile</button>
                </div>
            </div>
            
            <div class="card">
                <h3>Account Details</h3>
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <span style="font-size: 13px; color: #666; font-weight: 800;">Active Plan</span>
                    <span id="profile-tier" style="font-size: 13px; font-weight: 900; color: var(--accent-gold);">LOADING...</span>
                </div>
                <button class="btn-main" onclick="signOut()" style="background: transparent; border: 1px solid #222; color: #888; font-size: 11px;">Log Out</button>
            </div>
        </section>

        <section id="view-support" class="view-section">
            <div class="card">
                <div id="support-form-container">
                    <h3>Contact Support</h3>
                    <form id="support-form">
                        <div class="form-group">
                            <label>Subject</label>
                            <input type="text" id="sup-subject" required placeholder="e.g. Question about my listing">
                        </div>
                        <div class="form-group">
                            <label>Inquiry</label>
                            <textarea id="sup-inquiry" required placeholder="How can we help you?" style="min-height: 120px; resize: vertical;"></textarea>
                        </div>
                        <button type="submit" id="support-submit-btn" class="btn-main btn-gold">Send Message</button>
                    </form>
                </div>
                <div id="support-confirmation" style="display: none; text-align: center; padding: 40px 20px;">
                    <h3 style="color: var(--accent-gold); margin-bottom: 15px;">Message Sent</h3>
                    <button class="btn-split" onclick="showTab('dashboard')" style="margin: 0 auto; max-width: 250px; display: block;">Back to Dashboard</button>
                </div>
            </div>
        </section>

        <section id="view-submit" class="view-section">
            <div style="margin-bottom: 30px; text-align: left;">
                <button onclick="showTab('dashboard')" style="background:none; border:none; color:var(--accent-gold); font-size:11px; font-weight:900; text-transform:uppercase; cursor:pointer; letter-spacing: 1px;">← Cancel Production</button>
            </div>
            <div class="card">
                <form id="inventory-form">
                    <div class="form-group">
                        <label>Vehicle Name (Year Make Model)</label>
                        <input type="text" id="f-name" required placeholder="e.g. 2024 Kia K4">
                    </div>
                    <div class="form-group" style="background: #050505; padding: 25px; border-radius: 12px; border: 1px solid #1a1a1a;">
                        <label>Asset URL</label>
                        <input type="text" id="f-source" placeholder="Link to photos">
                        <div style="text-align: center; margin: 20px 0; color: #333; font-size: 10px; font-weight: 900;">OR</div>
                        <label>Direct Photo Upload (Max 10)</label>
                        <button type="button" class="btn-split" style="width:100%;" onclick="document.getElementById('f-gallery').click()">📁 Gallery</button>
                        <div id="staging-gallery"></div>
                        <input type="file" id="f-gallery" multiple accept="image/*" style="display: none;" onchange="stageFiles(this)">
                    </div>
                    <div class="split-row">
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label>Showroom Wall Color</label>
                            <input type="text" id="f-color" placeholder="White (Default)">
                        </div>
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label>Logo Placement</label>
                            <select id="f-logo">
                                <option value="Bottom Left" selected>Bottom Left</option>
                                <option value="Bottom Right">Bottom Right</option>
                                <option value="Top Right">Top Right</option>
                                <option value="Top Left">Top Left</option>
                                <option value="Showroom Wall">Showroom Wall</option>
                                <option value="No Logo">No Logo</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" id="submit-btn" class="btn-main btn-gold" style="margin-top:30px;">Initialize Staging</button>
                </form>
            </div>
        </section>
    </div>

    <footer><p class="footer-copyright">© 2026 Premiere Flow. All Rights Reserved.</p></footer>

    <script>
        let userData = { listings: [], history: [] };
        let stagedFiles = [];
        const dataFetchWebhook = 'https://hook.us2.make.com/68lredtt2kjjq3e5qx4ycjevgm4zr3qa'; 

        window.onload = function() {
            const email = localStorage.getItem('pf_email');
            if (!email) { window.location.href = '/login/'; return; }
            fetchDashboardData(email);
            setTimeout(() => { 
                const overlay = document.getElementById('transition-overlay');
                if(overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 800); }
            }, 1200);
        };

        async function fetchDashboardData(email) {
            try {
                const res = await fetch(dataFetchWebhook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email: email }) });
                userData = await res.json();
                document.getElementById('profile-tier').innerText = (userData.tier || 'N/A').toUpperCase();
                renderListings();
            } catch (err) { console.error("Load failed", err); }
        }

        function renderListings() {
            const list = document.getElementById('submissions-list');
            const items = (userData.listings || userData.history || []).filter(item => item && (item.vehicle || item.name)).reverse();
            if(items.length === 0) {
                list.innerHTML = '<p style="color:#444; font-size:11px; text-transform:uppercase; font-weight:800; text-align:center; padding:40px;">No listings found</p>';
                return;
            }
            list.innerHTML = items.map((item, idx) => {
                const isComplete = (item.status || '').toUpperCase() === 'COMPLETED';
                const fixGoogleLink = (url) => {
                    if (!url || !url.includes('drive.google.com')) return url;
                    const id = url.split('id=')[1] || url.split('/d/')[1]?.split('/')[0];
                    return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w1000` : url;
                };
                let thumbSource = fixGoogleLink(item.thumbnail || (item.originals ? item.originals.split(',')[0].trim() : ''));

                return `
                <div class="listing-card">
                    <div class="listing-main-row">
                        <div class="listing-info-left">
                            ${thumbSource ? `<img src="${thumbSource}" class="listing-thumb">` : `<div class="listing-thumb" style="background:#111; display:flex; align-items:center; justify-content:center; color:#333; font-size:10px;">PF</div>`}
                            <div>
                                <p class="listing-title">${item.vehicle || item.name || 'Listing'}</p>
                                <span class="listing-date">Submitted: ${item.date || '---'}</span>
                            </div>
                        </div>
                        <div class="listing-status-right">
                            <span class="status-badge ${isComplete ? 'status-completed' : 'status-progress'}">${(item.status || 'Received').toUpperCase()}</span>
                            <button class="btn-download ${isComplete ? 'active' : 'disabled'}">${isComplete ? 'DOWNLOAD' : 'PROCESSING'}</button>
                        </div>
                    </div>
                    <div class="listing-accordion-row">
                        <button class="accordion-btn" onclick="toggleAccordion('uploaded-${idx}')">Originals ▾</button>
                        <button class="accordion-btn ${isComplete ? '' : 'disabled'}" onclick="toggleAccordion('upgraded-${idx}')">Staged ▾</button>
                    </div>
                    <div id="uploaded-${idx}" style="display: none; padding: 25px; background: #050505; border-top: 1px solid #111;">
                        <div class="listing-gallery">${(item.originals || '').split(',').map(url => url.trim() ? `<div class="gallery-item"><a href="${url}" target="_blank"><img src="${fixGoogleLink(url)}" loading="lazy"></a></div>` : '').join('')}</div>
                    </div>
                    <div id="upgraded-${idx}" style="display: none; padding: 25px; background: #050505; border-top: 1px solid #111;">
                        <div class="listing-gallery">${isComplete ? (item.staged || '').split(',').map(url => url.trim() ? `<div class="gallery-item"><a href="${url}" target="_blank"><img src="${fixGoogleLink(url)}" loading="lazy"></a></div>` : '').join('')} : 'Processing...'}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleAccordion(id) {
            const panel = document.getElementById(id);
            panel.style.display = (panel.style.display === "none") ? "block" : "none";
        }

        function showTab(t) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById('view-' + t).classList.add('active');
            document.getElementById('tab-' + t)?.classList.add('active');
        }

        function stageFiles(input) {
            Array.from(input.files).forEach(f => { if (stagedFiles.length < 10) stagedFiles.push(f); });
            renderGallery();
        }

        function renderGallery() {
            const cont = document.getElementById('staging-gallery');
            cont.innerHTML = stagedFiles.map((f, i) => `<div class="thumb-wrapper"><img src="${URL.createObjectURL(f)}"><button type="button" class="remove-thumb" onclick="stagedFiles.splice(${i}, 1); renderGallery();">✕</button></div>`).join('');
        }

        document.getElementById('inventory-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.classList.add('btn-loading');
            const formData = new FormData();
            formData.append('accountId', userData.accountId || userData.accountID);
            formData.append('vehicleName', document.getElementById('f-name').value.trim());
            formData.append('assetSource', document.getElementById('f-source').value.trim());
            formData.append('showroomColor', document.getElementById('f-color').value || "White");
            formData.append('logoPlacement', document.getElementById('f-logo').value);
            stagedFiles.forEach(f => formData.append('uploadAssets', f));
            try {
                await fetch('https://hook.us2.make.com/ffvrlwmhkukr66bmik4obd0c1ymi2sso', { method: 'POST', body: formData });
                document.getElementById('inventory-form').reset();
                stagedFiles = []; renderGallery();
                btn.classList.remove('btn-loading');
                showTab('dashboard');
                fetchDashboardData(localStorage.getItem('pf_email'));
            } catch (err) { btn.classList.remove('btn-loading'); }
        });

        function signOut() { localStorage.clear(); window.location.href = '/login/'; }
    </script>
</body>
</html>
