    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --accent: #ffffff;
            --text-dim: #888;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 { font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 10px; text-transform: uppercase; }
        p.subtitle { color: var(--text-dim); font-size: 1.1rem; }

        /* Showcase Grid */
        .showcase-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 80px;
        }

        @media (max-width: 768px) {
            .showcase-grid { grid-template-columns: 1fr; }
        }

        .slider-label {
            text-align: center;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        /* Refactored Non-Magnifying Slider */
        .before-after-slider {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid #333;
            line-height: 0;
        }

        /* The After Image (Base Layer) */
        .before-after-slider img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* The Before Image (Overlay Layer) */
        .img-before {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            object-fit: contain;
            clip-path: inset(0 50% 0 0); 
        }

        .slider-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            outline: none;
            margin: 0;
            z-index: 10;
            cursor: ew-resize;
        }

        /* Visual Handle Line */
        .slider-handle {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: white;
            z-index: 5;
            pointer-events: none;
            transform: translateX(-50%);
        }

        .handle-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
