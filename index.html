<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premiere Flow | Elite Auto Showroom AI</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta property="og:title" content="Premiere Flow | Elite Auto Showroom AI">
    <meta property="og:description" content="Transform aging inventory into high-end showroom listings in seconds.">
    <meta property="og:image" content="logo-share.png">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --accent: #ffffff;
            --text-dim: #666666;
            --border: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        h1 { 
            font-size: 3.5rem; 
            letter-spacing: -2px; 
            margin-bottom: 10px; 
            text-transform: uppercase;
            font-weight: 800;
        }

        p.subtitle { 
            color: var(--text-dim); 
            font-size: 1.2rem; 
            font-weight: 400;
        }

        /* Showcase Grid */
        .showcase-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 100px;
        }

        @media (max-width: 900px) {
            .showcase-grid { grid-template-columns: 1fr; }
        }

        .slider-label {
            text-align: center;
            font-weight: 700;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #444;
        }

        /* Fixed Non-Magnifying Slider */
        .before-after-slider {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 4px;
            border: 1px solid var(--border);
            line-height: 0;
        }

        .before-after-slider img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .img-before {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            object-fit: contain;
            clip-path: inset(0 50% 0 0); 
        }

        .slider-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            outline: none;
            margin: 0;
            z-index: 10;
            cursor: ew-resize;
        }

        .slider-handle {
            position: absolute;
            top: 0;
            left: 50%;
            width: 1px;
            height: 100%;
            background: rgba(255,255,255,0.5);
            z-index: 5;
            pointer-events: none;
            transform: translateX(-50%);
        }

        .handle-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .handle-dot::after {
            content: "↔";
            color: black;
            font-weight: bold;
            font-size: 14px;
        }

        /* Restored High-End Pricing Cards */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .card {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 4px;
            border: 1px solid var(--border);
            text-align: left;
            transition: all 0.3s ease;
            position: relative;
        }

        .card:hover { 
            border-color: #333;
            background: #0d0d0d;
        }

        .price { 
            font-size: 3rem; 
            font-weight: 700; 
            margin: 20px 0; 
            letter-spacing: -2px;
        }

        .tier-name { 
            color: #444; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            font-weight: 800; 
            letter-spacing: 2px;
        }

        .card p {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background: white;
            color: black;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 2px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        footer {
            text-align: center;
            margin-top: 150px;
            padding-bottom: 60px;
        }

        .questions { color: #333; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
