<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful | Premiere Flow</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: #000; color: #fff; padding: 20px; font-family: sans-serif;">
    
    <h1 style="font-size: 3.5rem; letter-spacing: -2px; margin: 0;">PAYMENT <span class="accent" style="color: #007bff;">SUCCESS.</span></h1>
    
    <div style="background: #080808; border: 1px solid #1a1a1a; padding: 40px; border-radius: 24px; margin-top: 30px; max-width: 500px; width: 100%; box-sizing: border-box;">
        <p style="color: #fff; font-weight: 700; margin-bottom: 10px; font-size: 1.2rem;">Welcome to the Team.</p>
        
        <div id="status-container" style="margin: 20px 0;">
            <div id="loader-content">
                <div class="spinner"></div>
                <p style="color: #666; font-size: 0.9rem; line-height: 1.6; margin-top: 15px;">
                    Generating your unique <b>Premiere Account ID</b>...<br>
                    <span style="font-size: 0.8rem; color: #444;">This usually takes 5-10 seconds.</span>
                </p>
            </div>

            <div id="id-content" style="display: none;">
                <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; color: #007bff; font-weight: 700; margin-bottom: 5px;">Your Official Account ID</p>
                <h2 id="display-account-id" style="font-size: 3rem; margin: 0; color: #fff; font-weight: 900; letter-spacing: -1px;"></h2>
                <p style="color: #28a745; font-size: 0.8rem; font-weight: 700; margin-top: 10px;">✓ ACCOUNT ACTIVE</p>
            </div>
        </div>
        <a href="../submit/" id="portal-btn" class="get-started-btn" style="text-decoration: none; display: block; background: #fff; color: #000; padding: 15px; border-radius: 8px; font-weight: 800; margin-top: 20px;">GO TO SUBMIT PORTAL</a>
    </div>
    
    <p style="margin-top: 40px; font-size: 11px; color: #333; text-transform: uppercase; letter-spacing: 2px;">Questions? Email nick@premiereflow.com</p>

    <style>
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #1a1a1a;
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');
        
        // PASTE YOUR NEW MAKE.COM LOOKUP WEBHOOK URL HERE
        const MAKE_LOOKUP_URL = "https://hook.us2.make.com/wpdyvh7ais5h23lnu4odd9o6hpulmx7z";

        async function checkAccountID() {
            if (!sessionId) {
                document.querySelector('#loader-content p').innerText = "Session ID missing. Please check your email.";
                return;
            }

            try {
                const response = await fetch(`${MAKE_LOOKUP_URL}?sessionId=${sessionId}`);
                const data = await response.json();

                // Check if accountID exists and isn't empty
                if (data && data.accountID && data.accountID.length > 2) {
                    document.getElementById('loader-content').style.display = 'none';
                    document.getElementById('display-account-id').innerText = data.accountID;
                    document.getElementById('id-content').style.display = 'block';
                } else {
                    // Not found yet, poll again in 3 seconds
                    setTimeout(checkAccountID, 3000);
                }
            } catch (err) {
                console.error("Error fetching ID...");
                setTimeout(checkAccountID, 5000); // Wait 5s on error
            }
        }

        // Start the loop
        checkAccountID();
    </script>
</body>
</html>
