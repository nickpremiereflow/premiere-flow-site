<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Premiere Flow</title>
    <link rel="icon" type="image/png" href="../premiereflowfavicon.png">
    <link rel="stylesheet" href="../style.css">
    <style>
        .header-container { margin-top: 40px; text-align: center; width: 100%; }
        .logo-img { height: 40px; }
        .about-container { max-width: 900px; margin: 0 auto; padding: 40px 20px 100px 20px; text-align: center; }
        .about-hero h1 { font-size: clamp(2.2rem, 9vw, 4rem); margin-bottom: 15px; line-height: 1.1; letter-spacing: -1px; }
        .philosophy-card { background: #111111; border: 1px solid #222; padding: 60px 40px; margin-top: 30px; }
        .sub-label { color: #d4af37; text-transform: uppercase; letter-spacing: 2px; font-size: 10px; margin-bottom: 10px; display: block; }
        .emotional-hook { font-size: 1.7rem; color: #ffffff; font-weight: 600; display: block; margin-bottom: 20px; }
        .philosophy-text { font-size: 1.4rem; color: #bbbbbb; font-weight: 300; margin: 0 auto; max-width: 700px; }
        .about-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; text-align: left; }
        .grid-box { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 30px; }
        .grid-box h3 { margin-top: 0; font-size: 1.2rem; color: #d4af37; }
        .grid-box p { font-size: 1rem; color: #999; }
        .back-home { margin-top: 60px; display: inline-block; color: #666; text-decoration: none; font-size: 11px; letter-spacing: 2px; border-bottom: 1px solid transparent; transition: 0.3s; }
        .back-home:hover { color: #d4af37; border-bottom: 1px solid #d4af37; }

        footer { margin-top: 80px; padding: 40px 20px; border-top: 1px solid #1a1a1a; text-align: center; position: relative; }
        .footer-nav { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; white-space: nowrap; }
        .footer-link { color: #555; text-decoration: none; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s; cursor: pointer; }
        .footer-link:hover { color: #fff; }
        .footer-copyright { color: #222; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }

        .contact-wrapper { position: relative; display: inline-block; }
        .contact-bubble {
            visibility: hidden; background-color: #111; color: #fff; text-align: center;
            border-radius: 8px; padding: 12px 15px; position: absolute; z-index: 100;
            bottom: 150%; left: 50%; transform: translateX(-50%);
            border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            width: max-content; opacity: 0; transition: opacity 0.3s; font-family: sans-serif;
        }
        .contact-bubble.show { visibility: visible; opacity: 1; }
        .contact-email { color: #d4af37; text-decoration: none; font-size: 12px; font-weight: 600; margin-right: 10px; vertical-align: middle; }
        .copy-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 0; vertical-align: middle; }
    </style>
</head>
<body>
    <header class="header-container"><a href="../"><img src="../logo.png" alt="Premiere Flow Logo" class="logo-img"></a></header>
    <main class="about-container">
        <section class="cta-area"><a href="../" class="back-home">RETURN HOME</a></section>
    </main>
    <footer>
        <div class="footer-nav">
            <a href="../about/" class="footer-link">About</a>
            <a href="../sign-up/" class="footer-link">Sign Up</a>
            <a href="../submit/" class="footer-link">Submit Portal</a>
            <div class="contact-wrapper">
                <span class="footer-link" onclick="toggleContact()">Contact</span>
                <div id="contactBubble" class="contact-bubble">
                    <span style="font-size: 9px; display: block; margin-bottom: 5px; color: #555; letter-spacing: 1px; text-transform: uppercase;">Reach out</span>
                    <a href="mailto:info@premiereflow.com" class="contact-email">info@premiereflow.com</a>
                    <button class="copy-btn" onclick="copyEmail()">Copy</button>
                </div>
            </div>
            <a href="#" class="footer-link">Terms</a>
        </div>
        <p class="footer-copyright">© 2026 Premiere Flow. All Rights Reserved.</p>
    </footer>
    <script>
        function toggleContact() { document.getElementById("contactBubble").classList.toggle("show"); }
        function copyEmail() { navigator.clipboard.writeText("info@premiereflow.com"); const btn = document.querySelector(".copy-btn"); btn.innerText = "Done"; setTimeout(() => { btn.innerText = "Copy"; }, 2000); }
        window.onclick = function(event) { if (!event.target.matches('.footer-link')) { const bubble = document.getElementById("contactBubble"); if (bubble.classList.contains('show')) { bubble.classList.remove('show'); } } }
    </script>
</body>
</html>
